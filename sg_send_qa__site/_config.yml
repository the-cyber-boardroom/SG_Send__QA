title: SG/Send QA
description: Living documentation and automated test results for SG/Send — the encrypted file sharing platform
url: https://qa.send.sgraph.ai

plugins:
  - jekyll-last-modified-at

highlighter: rouge
markdown: kramdown
kramdown:
  syntax_highlighter: rouge

last-modified-at:
  date-format: '%Y-%m-%d %H:%M'

defaults:
  - scope:
      path: ""
    values:
      layout: default

navigation:
  main:
    - title: Home
      url: /
    - title: Dashboard
      url: /pages/dashboard/
    - title: Pipeline
      url: /pages/pipeline/
    - title: Roadmap
      url: /pages/roadmap/
    - title: Known Bugs
      url: /pages/known-bugs/
    - title: Change Requests
      url: /pages/change-requests/

exclude:
  - Gemfile
  - Gemfile.lock
