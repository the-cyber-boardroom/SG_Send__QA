title: SG/Send QA
description: Living documentation and automated test results for SG/Send — the encrypted file sharing platform
url: https://qa.send.sgraph.ai

plugins:
  - jekyll-last-modified-at

last-modified-at:
  date-format: '%Y-%m-%d %H:%M'

defaults:
  - scope:
      path: ""
    values:
      layout: default

navigation:
  main:
    - title: Home
      url: /
    - title: Use Cases
      url: /pages/use-cases/
    - title: Pipeline
      url: /pages/pipeline/
    - title: Roadmap
      url: /pages/roadmap/
    - title: Known Bugs
      url: /pages/known-bugs/
    - title: Change Requests
      url: /pages/change-requests/
  use_cases:
    - title: Landing Page Loads
      url: /pages/use-cases/landing_page_loads/
      id: landing_page_loads
    - title: Access Gate Present
      url: /pages/use-cases/landing_page_has_access_gate/
      id: landing_page_has_access_gate
    - title: Invalid Token Rejected
      url: /pages/use-cases/invalid_token_rejected/
      id: invalid_token_rejected
    - title: "Access Token Gate (UC-10)"
      url: /pages/use-cases/access_gate/
      id: access_gate
    - title: "Route Handling (UC-11)"
      url: /pages/use-cases/route_handling/
      id: route_handling
    - title: "Known Bugs"
      url: /pages/use-cases/bugs/
      id: bugs

exclude:
  - Gemfile
  - Gemfile.lock
