name: CI Pipeline (Base)

on:
  workflow_call:
    inputs:
      git_branch:
        required: true
        type: string
      release_type:
        required: false
        type: string
        default: ""
      should_increment_tag:
        required: false
        type: boolean
        default: false

env:
  PACKAGE_NAME : 'sg_send_qa'
  GIT__BRANCH  : ${{ inputs.git_branch }}

permissions:
  contents: write

jobs:
  run-unit-tests:
    name: "Run Unit Tests"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install SG/Send (for test server + UI package)
        run: |
          git clone --depth 1 -b dev https://github.com/the-cyber-boardroom/SGraph-AI__App__Send /tmp/sgraph-send-ref
          pip install -e /tmp/sgraph-send-ref --no-deps

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest-timeout
          python -m playwright install --with-deps chromium

      - name: Run unit tests
        timeout-minutes: 5
        run: python -m pytest tests/unit/ -v --timeout=30

  run-integration-tests:
    name: "Run Integration Tests (Browser)"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [run-unit-tests]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install SG/Send (for test server + UI package)
        run: |
          git clone --depth 1 -b dev https://github.com/the-cyber-boardroom/SGraph-AI__App__Send /tmp/sgraph-send-ref
          pip install -e /tmp/sgraph-send-ref --no-deps

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest-timeout
          python -m playwright install --with-deps chromium

      - name: Run integration tests
        timeout-minutes: 5
        run: python -m pytest tests/integration/ -v --tb=short --timeout=60

  increment-tag:
    name: Increment Tag
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [run-unit-tests, run-integration-tests]
    if: inputs.should_increment_tag
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Increment Tag
        uses: ./.github/actions/git__increment-tag
        with:
          release_type: ${{ inputs.release_type }}

