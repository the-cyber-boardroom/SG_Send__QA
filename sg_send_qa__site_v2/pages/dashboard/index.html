<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Dashboard — SG/Send QA</title>
    <meta name="description" content="QA coverage dashboard — test counts, screenshot evidence, and per-group coverage.">

    <link rel="icon" type="image/svg+xml" href="../../_common/favicon.svg">
    <link rel="stylesheet" href="../../_common/fonts/fonts.css">
    <link rel="stylesheet" href="../../_common/css/design-tokens.css">

<body>

    <sg-site-header
        site="QA"
        home-url="https://qa.send.sgraph.ai"
        nav-items='[

            {"label":"Pipeline",  "href":"/pages/pipeline/"},
            {"label":"Roadmap",   "href":"/pages/roadmap/"},

    <div class="qa-content-wrapper">

        <div class="qa-sidebar-slot">
            <qa-sidebar data-current="/pages/dashboard/"></qa-sidebar>
        </div>

        <main class="qa-main">
            <qa-dashboard></qa-dashboard>

    <sg-site-footer

        copyright="SGraph AI">

    <script src="../../_common/js/build-info.js"></script>

    <script type="module" src="https://dev.tools.sgraph.ai/components/site-header/v1/v1.0/v1.0.2/sg-site-header.js"></script>
