            <script type="text/qa-source">
<span class="sd">&quot;&quot;&quot;UC-07: Browse view features (P1).</span>

<span class="sd">Test flow:</span>
<span class="sd">  - Verify folder tree renders with expand/collapse controls</span>
<span class="sd">  - Verify file click opens preview tab in right panel</span>
<span class="sd">  - Verify keyboard navigation: j/k moves through files, s saves</span>
<span class="sd">  - Verify Share tab shows URL + copy + email</span>
<span class="sd">  - Verify Info tab shows file counts by type, encryption info</span>
<span class="sd">  - Verify &quot;Save locally&quot; downloads the zip</span>
<span class="sd">  - Verify print button is present</span>
<span class="sd">&quot;&quot;&quot;</span>

<span class="kn">import</span><span class="w"> </span><span class="nn">pytest</span>
<span class="kn">import</span><span class="w"> </span><span class="nn">zipfile</span>
<span class="kn">import</span><span class="w"> </span><span class="nn">io</span>

<span class="n">pytestmark</span> <span class="o">=</span> <span class="n">pytest</span><span class="o">.</span><span class="n">mark</span><span class="o">.</span><span class="n">p1</span>


<span class="k">def</span><span class="w"> </span><span class="nf">_make_folder_zip</span><span class="p">():</span>
    <span class="n">buf</span> <span class="o">=</span> <span class="n">io</span><span class="o">.</span><span class="n">BytesIO</span><span class="p">()</span>
    <span class="k">with</span> <span class="n">zipfile</span><span class="o">.</span><span class="n">ZipFile</span><span class="p">(</span><span class="n">buf</span><span class="p">,</span> <span class="s2">&quot;w&quot;</span><span class="p">)</span> <span class="k">as</span> <span class="n">zf</span><span class="p">:</span>
        <span class="n">zf</span><span class="o">.</span><span class="n">writestr</span><span class="p">(</span><span class="s2">&quot;docs/readme.md&quot;</span><span class="p">,</span> <span class="s2">&quot;# Readme</span><span class="se">\n\n</span><span class="s2">This is the readme.&quot;</span><span class="p">)</span>
        <span class="n">zf</span><span class="o">.</span><span class="n">writestr</span><span class="p">(</span><span class="s2">&quot;docs/notes.txt&quot;</span><span class="p">,</span> <span class="s2">&quot;Some notes here.&quot;</span><span class="p">)</span>
        <span class="n">zf</span><span class="o">.</span><span class="n">writestr</span><span class="p">(</span><span class="s2">&quot;docs/sub/extra.md&quot;</span><span class="p">,</span> <span class="s2">&quot;# Extra</span><span class="se">\n\n</span><span class="s2">Extra content.&quot;</span><span class="p">)</span>
    <span class="n">buf</span><span class="o">.</span><span class="n">seek</span><span class="p">(</span><span class="mi">0</span><span class="p">)</span>
    <span class="k">return</span> <span class="n">buf</span><span class="o">.</span><span class="n">read</span><span class="p">()</span>


<span class="k">class</span><span class="w"> </span><span class="nc">TestBrowseViewFeatures</span><span class="p">:</span>
<span class="w">    </span><span class="sd">&quot;&quot;&quot;Verify browse view UI features for a folder zip.&quot;&quot;&quot;</span>

    <span class="k">def</span><span class="w"> </span><span class="nf">_open_browse</span><span class="p">(</span><span class="bp">self</span><span class="p">,</span> <span class="n">page</span><span class="p">,</span> <span class="n">ui_url</span><span class="p">,</span> <span class="n">transfer_helper</span><span class="p">):</span>
        <span class="n">zip_bytes</span> <span class="o">=</span> <span class="n">_make_folder_zip</span><span class="p">()</span>
        <span class="n">tid</span><span class="p">,</span> <span class="n">key_b64</span> <span class="o">=</span> <span class="n">transfer_helper</span><span class="o">.</span><span class="n">upload_encrypted</span><span class="p">(</span><span class="n">zip_bytes</span><span class="p">,</span> <span class="s2">&quot;docs.zip&quot;</span><span class="p">)</span>
        <span class="n">browse_url</span> <span class="o">=</span> <span class="sa">f</span><span class="s2">&quot;</span><span class="si">{</span><span class="n">ui_url</span><span class="si">}</span><span class="s2">/en-gb/browse/#</span><span class="si">{</span><span class="n">tid</span><span class="si">}</span><span class="s2">/</span><span class="si">{</span><span class="n">key_b64</span><span class="si">}</span><span class="s2">&quot;</span>
        <span class="n">page</span><span class="o">.</span><span class="n">goto</span><span class="p">(</span><span class="n">browse_url</span><span class="p">)</span>
        <span class="n">page</span><span class="o">.</span><span class="n">wait_for_load_state</span><span class="p">(</span><span class="s2">&quot;networkidle&quot;</span><span class="p">)</span>
        <span class="n">page</span><span class="o">.</span><span class="n">wait_for_timeout</span><span class="p">(</span><span class="mi">3000</span><span class="p">)</span>
        <span class="k">return</span> <span class="n">tid</span><span class="p">,</span> <span class="n">key_b64</span>

    <span class="k">def</span><span class="w"> </span><span class="nf">test_browse_page_loads</span><span class="p">(</span><span class="bp">self</span><span class="p">,</span> <span class="n">page</span><span class="p">,</span> <span class="n">ui_url</span><span class="p">,</span> <span class="n">transfer_helper</span><span class="p">,</span> <span class="n">screenshots</span><span class="p">):</span>
<span class="w">        </span><span class="sd">&quot;&quot;&quot;Browse page loads without errors.&quot;&quot;&quot;</span>
        <span class="n">tid</span><span class="p">,</span> <span class="n">key_b64</span> <span class="o">=</span> <span class="bp">self</span><span class="o">.</span><span class="n">_open_browse</span><span class="p">(</span><span class="n">page</span><span class="p">,</span> <span class="n">ui_url</span><span class="p">,</span> <span class="n">transfer_helper</span><span class="p">)</span>
        <span class="n">screenshots</span><span class="o">.</span><span class="n">capture</span><span class="p">(</span><span class="n">page</span><span class="p">,</span> <span class="s2">&quot;01_browse_loaded&quot;</span><span class="p">,</span> <span class="s2">&quot;Browse view loaded&quot;</span><span class="p">)</span>

        <span class="n">page_text</span> <span class="o">=</span> <span class="n">page</span><span class="o">.</span><span class="n">text_content</span><span class="p">(</span><span class="s2">&quot;body&quot;</span><span class="p">)</span> <span class="ow">or</span> <span class="s2">&quot;&quot;</span>
        <span class="k">assert</span> <span class="s2">&quot;error&quot;</span> <span class="ow">not</span> <span class="ow">in</span> <span class="n">page_text</span><span class="o">.</span><span class="n">lower</span><span class="p">()</span> <span class="ow">or</span> <span class="nb">any</span><span class="p">(</span>
            <span class="n">kw</span> <span class="ow">in</span> <span class="n">page_text</span><span class="o">.</span><span class="n">lower</span><span class="p">()</span> <span class="k">for</span> <span class="n">kw</span> <span class="ow">in</span> <span class="p">[</span><span class="s2">&quot;browse&quot;</span><span class="p">,</span> <span class="s2">&quot;folder&quot;</span><span class="p">,</span> <span class="s2">&quot;file&quot;</span><span class="p">,</span> <span class="s2">&quot;tree&quot;</span><span class="p">]</span>
        <span class="p">),</span> <span class="s2">&quot;Browse page shows error&quot;</span>

    <span class="k">def</span><span class="w"> </span><span class="nf">test_folder_tree_present</span><span class="p">(</span><span class="bp">self</span><span class="p">,</span> <span class="n">page</span><span class="p">,</span> <span class="n">ui_url</span><span class="p">,</span> <span class="n">transfer_helper</span><span class="p">,</span> <span class="n">screenshots</span><span class="p">):</span>
<span class="w">        </span><span class="sd">&quot;&quot;&quot;Folder tree is rendered in the left panel.&quot;&quot;&quot;</span>
        <span class="bp">self</span><span class="o">.</span><span class="n">_open_browse</span><span class="p">(</span><span class="n">page</span><span class="p">,</span> <span class="n">ui_url</span><span class="p">,</span> <span class="n">transfer_helper</span><span class="p">)</span>

        <span class="c1"># Tree items or folder navigation elements</span>
        <span class="n">tree</span> <span class="o">=</span> <span class="n">page</span><span class="o">.</span><span class="n">locator</span><span class="p">(</span>
            <span class="s2">&quot;[class*=&#39;tree&#39;], [class*=&#39;folder&#39;], [class*=&#39;sidebar&#39;], &quot;</span>
            <span class="s2">&quot;nav li, ul li a[href]&quot;</span>
        <span class="p">)</span><span class="o">.</span><span class="n">first</span>
        <span class="n">screenshots</span><span class="o">.</span><span class="n">capture</span><span class="p">(</span><span class="n">page</span><span class="p">,</span> <span class="s2">&quot;02_folder_tree&quot;</span><span class="p">,</span> <span class="s2">&quot;Folder tree in browse view&quot;</span><span class="p">)</span>

        <span class="c1"># Either tree or file listing should be present</span>
        <span class="k">assert</span> <span class="n">tree</span><span class="o">.</span><span class="n">count</span><span class="p">()</span> <span class="o">&gt;</span> <span class="mi">0</span> <span class="ow">or</span> <span class="n">page</span><span class="o">.</span><span class="n">locator</span><span class="p">(</span><span class="s2">&quot;body&quot;</span><span class="p">)</span><span class="o">.</span><span class="n">text_content</span><span class="p">()</span> <span class="ow">is</span> <span class="ow">not</span> <span class="kc">None</span>

    <span class="k">def</span><span class="w"> </span><span class="nf">test_file_click_opens_preview</span><span class="p">(</span><span class="bp">self</span><span class="p">,</span> <span class="n">page</span><span class="p">,</span> <span class="n">ui_url</span><span class="p">,</span> <span class="n">transfer_helper</span><span class="p">,</span> <span class="n">screenshots</span><span class="p">):</span>
<span class="w">        </span><span class="sd">&quot;&quot;&quot;Clicking a file in the tree opens a preview in the right panel.&quot;&quot;&quot;</span>

            <span class="n">screenshots</span><span class="o">.</span><span class="n">capture</span><span class="p">(</span><span class="n">page</span><span class="p">,</span> <span class="s2">&quot;03_file_preview&quot;</span><span class="p">,</span> <span class="s2">&quot;File preview after click&quot;</span><span class="p">)</span>

    <span class="k">def</span><span class="w"> </span><span class="nf">test_share_tab_present</span><span class="p">(</span><span class="bp">self</span><span class="p">,</span> <span class="n">page</span><span class="p">,</span> <span class="n">ui_url</span><span class="p">,</span> <span class="n">transfer_helper</span><span class="p">,</span> <span class="n">screenshots</span><span class="p">):</span>
<span class="w">        </span><span class="sd">&quot;&quot;&quot;Share tab shows URL, copy, and email actions.&quot;&quot;&quot;</span>
        <span class="bp">self</span><span class="o">.</span><span class="n">_open_browse</span><span class="p">(</span><span class="n">page</span><span class="p">,</span> <span class="n">ui_url</span><span class="p">,</span> <span class="n">transfer_helper</span><span class="p">)</span>

            <span class="n">share_tab</span><span class="o">.</span><span class="n">click</span><span class="p">()</span>
            <span class="n">page</span><span class="o">.</span><span class="n">wait_for_timeout</span><span class="p">(</span><span class="mi">500</span><span class="p">)</span>
            <span class="n">screenshots</span><span class="o">.</span><span class="n">capture</span><span class="p">(</span><span class="n">page</span><span class="p">,</span> <span class="s2">&quot;04_share_tab&quot;</span><span class="p">,</span> <span class="s2">&quot;Share tab content&quot;</span><span class="p">)</span>

                <span class="s2">&quot;Share tab does not show copy/email/link options&quot;</span>

    <span class="k">def</span><span class="w"> </span><span class="nf">test_info_tab_present</span><span class="p">(</span><span class="bp">self</span><span class="p">,</span> <span class="n">page</span><span class="p">,</span> <span class="n">ui_url</span><span class="p">,</span> <span class="n">transfer_helper</span><span class="p">,</span> <span class="n">screenshots</span><span class="p">):</span>
<span class="w">        </span><span class="sd">&quot;&quot;&quot;Info tab shows file counts and encryption info.&quot;&quot;&quot;</span>
        <span class="bp">self</span><span class="o">.</span><span class="n">_open_browse</span><span class="p">(</span><span class="n">page</span><span class="p">,</span> <span class="n">ui_url</span><span class="p">,</span> <span class="n">transfer_helper</span><span class="p">)</span>
