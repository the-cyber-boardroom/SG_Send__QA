            <script type="text/qa-source">
<span class="sd">&quot;&quot;&quot;UC-02: Folder upload → gallery + browse view (P1).</span>

<span class="sd">Test flow:</span>
<span class="sd">  1. Upload a folder containing 3+ images and a markdown file</span>
<span class="sd">  2. Verify gallery mode is auto-selected (3+ images triggers gallery)</span>
<span class="sd">  3. Verify thumbnail grid renders with correct file count</span>
<span class="sd">  4. Click a thumbnail → verify lightbox opens</span>
<span class="sd">  5. Close lightbox → click &quot;Folder view&quot; link</span>
<span class="sd">  6. Verify browse view loads with folder tree</span>
<span class="sd">  7. Click a file in the tree → verify it opens in preview</span>
<span class="sd">  8. Click &quot;Gallery view&quot; → verify it switches back</span>
<span class="sd">&quot;&quot;&quot;</span>

<span class="kn">import</span><span class="w"> </span><span class="nn">pytest</span>
<span class="kn">import</span><span class="w"> </span><span class="nn">zipfile</span>
<span class="kn">import</span><span class="w"> </span><span class="nn">io</span>

<span class="kn">from</span><span class="w"> </span><span class="nn">playwright.sync_api</span><span class="w"> </span><span class="kn">import</span> <span class="n">expect</span>
<span class="kn">from</span><span class="w"> </span><span class="nn">tests.qa.v030.browser_helpers</span><span class="w"> </span><span class="kn">import</span> <span class="n">goto</span><span class="p">,</span> <span class="n">handle_access_gate</span>

<span class="n">pytestmark</span> <span class="o">=</span> <span class="n">pytest</span><span class="o">.</span><span class="n">mark</span><span class="o">.</span><span class="n">p1</span>

<span class="c1"># Minimal 1×1 PNG bytes (valid PNG, tiny file)</span>
<span class="n">_PNG_HEADER</span> <span class="o">=</span> <span class="p">(</span>
    <span class="sa">b</span><span class="s1">&#39;</span><span class="se">\x89</span><span class="s1">PNG</span><span class="se">\r\n\x1a\n</span><span class="s1">&#39;</span>
    <span class="sa">b</span><span class="s1">&#39;</span><span class="se">\x00\x00\x00\r</span><span class="s1">IHDR</span><span class="se">\x00\x00\x00\x01\x00\x00\x00\x01</span><span class="s1">&#39;</span>
    <span class="sa">b</span><span class="s1">&#39;</span><span class="se">\x08\x02\x00\x00\x00\x90</span><span class="s1">wS</span><span class="se">\xde</span><span class="s1">&#39;</span>
    <span class="sa">b</span><span class="s1">&#39;</span><span class="se">\x00\x00\x00\x0c</span><span class="s1">IDATx</span><span class="se">\x9c</span><span class="s1">c</span><span class="se">\xf8\x0f\x00\x00\x01\x01\x00\x05\x18\xd8</span><span class="s1">N&#39;</span>
    <span class="sa">b</span><span class="s1">&#39;</span><span class="se">\x00\x00\x00\x00</span><span class="s1">IEND</span><span class="se">\xae</span><span class="s1">B`</span><span class="se">\x82</span><span class="s1">&#39;</span>
<span class="p">)</span>


<span class="k">def</span><span class="w"> </span><span class="nf">_make_folder_zip</span><span class="p">():</span>
<span class="w">    </span><span class="sd">&quot;&quot;&quot;Build an in-memory zip with 3 PNG images + 1 markdown file.&quot;&quot;&quot;</span>
    <span class="n">buf</span> <span class="o">=</span> <span class="n">io</span><span class="o">.</span><span class="n">BytesIO</span><span class="p">()</span>
    <span class="k">with</span> <span class="n">zipfile</span><span class="o">.</span><span class="n">ZipFile</span><span class="p">(</span><span class="n">buf</span><span class="p">,</span> <span class="s2">&quot;w&quot;</span><span class="p">)</span> <span class="k">as</span> <span class="n">zf</span><span class="p">:</span>
        <span class="n">zf</span><span class="o">.</span><span class="n">writestr</span><span class="p">(</span><span class="s2">&quot;my-folder/image1.png&quot;</span><span class="p">,</span> <span class="n">_PNG_HEADER</span><span class="p">)</span>
        <span class="n">zf</span><span class="o">.</span><span class="n">writestr</span><span class="p">(</span><span class="s2">&quot;my-folder/image2.png&quot;</span><span class="p">,</span> <span class="n">_PNG_HEADER</span><span class="p">)</span>
        <span class="n">zf</span><span class="o">.</span><span class="n">writestr</span><span class="p">(</span><span class="s2">&quot;my-folder/image3.png&quot;</span><span class="p">,</span> <span class="n">_PNG_HEADER</span><span class="p">)</span>
        <span class="n">zf</span><span class="o">.</span><span class="n">writestr</span><span class="p">(</span><span class="s2">&quot;my-folder/readme.md&quot;</span><span class="p">,</span> <span class="s2">&quot;# Test folder</span><span class="se">\n\n</span><span class="s2">This is a test.&quot;</span><span class="p">)</span>
    <span class="n">buf</span><span class="o">.</span><span class="n">seek</span><span class="p">(</span><span class="mi">0</span><span class="p">)</span>
    <span class="k">return</span> <span class="n">buf</span><span class="o">.</span><span class="n">read</span><span class="p">()</span>


<span class="k">class</span><span class="w"> </span><span class="nc">TestFolderUpload</span><span class="p">:</span>
<span class="w">    </span><span class="sd">&quot;&quot;&quot;Upload a folder zip and verify gallery + browse views.&quot;&quot;&quot;</span>

    <span class="k">def</span><span class="w"> </span><span class="nf">test_upload_zip_and_gallery_view</span><span class="p">(</span><span class="bp">self</span><span class="p">,</span> <span class="n">page</span><span class="p">,</span> <span class="n">ui_url</span><span class="p">,</span> <span class="n">send_server</span><span class="p">,</span> <span class="n">screenshots</span><span class="p">):</span>
<span class="w">        </span><span class="sd">&quot;&quot;&quot;Upload a zip with 3+ images; verify gallery mode is shown.&quot;&quot;&quot;</span>
        <span class="n">goto</span><span class="p">(</span><span class="n">page</span><span class="p">,</span> <span class="sa">f</span><span class="s2">&quot;</span><span class="si">{</span><span class="n">ui_url</span><span class="si">}</span><span class="s2">/en-gb/&quot;</span><span class="p">)</span>
        <span class="n">handle_access_gate</span><span class="p">(</span><span class="n">page</span><span class="p">,</span> <span class="n">send_server</span><span class="o">.</span><span class="n">access_token</span><span class="p">)</span>
        <span class="n">screenshots</span><span class="o">.</span><span class="n">capture</span><span class="p">(</span><span class="n">page</span><span class="p">,</span> <span class="s2">&quot;01_upload_page&quot;</span><span class="p">,</span> <span class="s2">&quot;Upload page loaded&quot;</span><span class="p">)</span>

        <span class="c1"># Feed the zip file</span>
        <span class="n">zip_bytes</span> <span class="o">=</span> <span class="n">_make_folder_zip</span><span class="p">()</span>
        <span class="n">page</span><span class="o">.</span><span class="n">locator</span><span class="p">(</span><span class="s2">&quot;#file-input&quot;</span><span class="p">)</span><span class="o">.</span><span class="n">set_input_files</span><span class="p">({</span>
            <span class="s2">&quot;name&quot;</span>    <span class="p">:</span> <span class="s2">&quot;my-folder.zip&quot;</span><span class="p">,</span>
            <span class="s2">&quot;mimeType&quot;</span><span class="p">:</span> <span class="s2">&quot;application/zip&quot;</span><span class="p">,</span>
            <span class="s2">&quot;buffer&quot;</span>  <span class="p">:</span> <span class="n">zip_bytes</span><span class="p">,</span>
        <span class="p">})</span>
        <span class="c1"># Wait for wizard to auto-advance to delivery step</span>
        <span class="n">page</span><span class="o">.</span><span class="n">locator</span><span class="p">(</span><span class="s2">&quot;#upload-next-btn&quot;</span><span class="p">)</span><span class="o">.</span><span class="n">wait_for</span><span class="p">(</span><span class="n">state</span><span class="o">=</span><span class="s2">&quot;visible&quot;</span><span class="p">)</span>
        <span class="n">screenshots</span><span class="o">.</span><span class="n">capture</span><span class="p">(</span><span class="n">page</span><span class="p">,</span> <span class="s2">&quot;02_file_selected&quot;</span><span class="p">,</span> <span class="s2">&quot;Zip file selected — delivery step&quot;</span><span class="p">)</span>

        <span class="c1"># Delivery → Share mode</span>
        <span class="n">page</span><span class="o">.</span><span class="n">locator</span><span class="p">(</span><span class="s2">&quot;#upload-next-btn&quot;</span><span class="p">)</span><span class="o">.</span><span class="n">click</span><span class="p">()</span>
        <span class="n">page</span><span class="o">.</span><span class="n">locator</span><span class="p">(</span><span class="s2">&quot;[data-mode]&quot;</span><span class="p">)</span><span class="o">.</span><span class="n">first</span><span class="o">.</span><span class="n">wait_for</span><span class="p">(</span><span class="n">state</span><span class="o">=</span><span class="s2">&quot;visible&quot;</span><span class="p">)</span>
        <span class="n">screenshots</span><span class="o">.</span><span class="n">capture</span><span class="p">(</span><span class="n">page</span><span class="p">,</span> <span class="s2">&quot;03_share_step&quot;</span><span class="p">,</span> <span class="s2">&quot;Share mode step&quot;</span><span class="p">)</span>

        <span class="c1"># Select combined link — auto-advances to confirm step</span>
        <span class="n">page</span><span class="o">.</span><span class="n">locator</span><span class="p">(</span><span class="s1">&#39;[data-mode=&quot;combined&quot;]&#39;</span><span class="p">)</span><span class="o">.</span><span class="n">click</span><span class="p">()</span>
        <span class="n">page</span><span class="o">.</span><span class="n">wait_for_timeout</span><span class="p">(</span><span class="mi">500</span><span class="p">)</span>  <span class="c1"># let confirm step transition settle</span>

        <span class="c1"># Confirm → Encrypt &amp; Upload — done step shows link as &lt;a href&gt;</span>
        <span class="n">page</span><span class="o">.</span><span class="n">locator</span><span class="p">(</span><span class="s2">&quot;#upload-next-btn&quot;</span><span class="p">)</span><span class="o">.</span><span class="n">click</span><span class="p">()</span>
        <span class="n">page</span><span class="o">.</span><span class="n">locator</span><span class="p">(</span><span class="s2">&quot;a[href*=&#39;#&#39;]&quot;</span><span class="p">)</span><span class="o">.</span><span class="n">first</span><span class="o">.</span><span class="n">wait_for</span><span class="p">(</span><span class="n">state</span><span class="o">=</span><span class="s2">&quot;attached&quot;</span><span class="p">,</span> <span class="n">timeout</span><span class="o">=</span><span class="mi">20_000</span><span class="p">)</span>
        <span class="n">screenshots</span><span class="o">.</span><span class="n">capture</span><span class="p">(</span><span class="n">page</span><span class="p">,</span> <span class="s2">&quot;04_upload_done&quot;</span><span class="p">,</span> <span class="s2">&quot;Upload complete — link shown&quot;</span><span class="p">)</span>

        <span class="c1"># Extract download URL</span>
        <span class="n">download_url</span> <span class="o">=</span> <span class="n">page</span><span class="o">.</span><span class="n">locator</span><span class="p">(</span><span class="s2">&quot;a[href*=&#39;#&#39;]&quot;</span><span class="p">)</span><span class="o">.</span><span class="n">first</span><span class="o">.</span><span class="n">get_attribute</span><span class="p">(</span><span class="s2">&quot;href&quot;</span><span class="p">)</span> <span class="ow">or</span> <span class="s2">&quot;&quot;</span>
        <span class="k">if</span> <span class="ow">not</span> <span class="n">download_url</span><span class="p">:</span>
            <span class="k">for</span> <span class="n">el</span> <span class="ow">in</span> <span class="n">page</span><span class="o">.</span><span class="n">locator</span><span class="p">(</span><span class="s2">&quot;input[readonly]&quot;</span><span class="p">)</span><span class="o">.</span><span class="n">all</span><span class="p">():</span>
                <span class="n">val</span> <span class="o">=</span> <span class="n">el</span><span class="o">.</span><span class="n">get_attribute</span><span class="p">(</span><span class="s2">&quot;value&quot;</span><span class="p">)</span> <span class="ow">or</span> <span class="s2">&quot;&quot;</span>
                <span class="k">if</span> <span class="s2">&quot;#&quot;</span> <span class="ow">in</span> <span class="n">val</span><span class="p">:</span>
                    <span class="n">download_url</span> <span class="o">=</span> <span class="n">val</span>
                    <span class="k">break</span>

        <span class="k">assert</span> <span class="n">download_url</span><span class="p">,</span> <span class="s2">&quot;No download link found after folder upload&quot;</span>

        <span class="k">if</span> <span class="n">download_url</span><span class="o">.</span><span class="n">startswith</span><span class="p">(</span><span class="s2">&quot;/&quot;</span><span class="p">):</span>
            <span class="n">download_url</span> <span class="o">=</span> <span class="sa">f</span><span class="s2">&quot;</span><span class="si">{</span><span class="n">ui_url</span><span class="si">}{</span><span class="n">download_url</span><span class="si">}</span><span class="s2">&quot;</span>

        <span class="c1"># Open the download page — expect gallery view (3 images auto-select gallery)</span>
        <span class="n">dl_page</span> <span class="o">=</span> <span class="n">page</span><span class="o">.</span><span class="n">context</span><span class="o">.</span><span class="n">new_page</span><span class="p">()</span>
        <span class="k">try</span><span class="p">:</span>
            <span class="n">goto</span><span class="p">(</span><span class="n">dl_page</span><span class="p">,</span> <span class="n">download_url</span><span class="p">)</span>
            <span class="n">screenshots</span><span class="o">.</span><span class="n">capture</span><span class="p">(</span><span class="n">dl_page</span><span class="p">,</span> <span class="s2">&quot;05_download_gallery&quot;</span><span class="p">,</span> <span class="s2">&quot;Gallery view after zip download&quot;</span><span class="p">)</span>

            <span class="n">page_text</span> <span class="o">=</span> <span class="n">dl_page</span><span class="o">.</span><span class="n">text_content</span><span class="p">(</span><span class="s2">&quot;body&quot;</span><span class="p">)</span> <span class="ow">or</span> <span class="s2">&quot;&quot;</span>
            <span class="k">assert</span> <span class="nb">any</span><span class="p">(</span><span class="n">kw</span> <span class="ow">in</span> <span class="n">page_text</span><span class="o">.</span><span class="n">lower</span><span class="p">()</span> <span class="k">for</span> <span class="n">kw</span> <span class="ow">in</span> <span class="p">[</span><span class="s2">&quot;gallery&quot;</span><span class="p">,</span> <span class="s2">&quot;image&quot;</span><span class="p">,</span> <span class="s2">&quot;thumbnail&quot;</span><span class="p">,</span> <span class="s2">&quot;photo&quot;</span><span class="p">]),</span> \
                <span class="s2">&quot;Gallery view not detected for image-heavy zip&quot;</span>
        <span class="k">finally</span><span class="p">:</span>
            <span class="n">dl_page</span><span class="o">.</span><span class="n">close</span><span class="p">()</span>

    <span class="k">def</span><span class="w"> </span><span class="nf">test_gallery_thumbnail_grid</span><span class="p">(</span><span class="bp">self</span><span class="p">,</span> <span class="n">page</span><span class="p">,</span> <span class="n">ui_url</span><span class="p">,</span> <span class="n">transfer_helper</span><span class="p">,</span> <span class="n">screenshots</span><span class="p">):</span>
<span class="w">        </span><span class="sd">&quot;&quot;&quot;Create a zip upload via API, open gallery, verify thumbnail grid.&quot;&quot;&quot;</span>
        <span class="n">zip_bytes</span> <span class="o">=</span> <span class="n">_make_folder_zip</span><span class="p">()</span>
        <span class="n">tid</span><span class="p">,</span> <span class="n">key_b64</span> <span class="o">=</span> <span class="n">transfer_helper</span><span class="o">.</span><span class="n">upload_encrypted</span><span class="p">(</span><span class="n">zip_bytes</span><span class="p">,</span> <span class="s2">&quot;my-folder.zip&quot;</span><span class="p">)</span>

        <span class="n">gallery_url</span> <span class="o">=</span> <span class="sa">f</span><span class="s2">&quot;</span><span class="si">{</span><span class="n">ui_url</span><span class="si">}</span><span class="s2">/en-gb/gallery/#</span><span class="si">{</span><span class="n">tid</span><span class="si">}</span><span class="s2">/</span><span class="si">{</span><span class="n">key_b64</span><span class="si">}</span><span class="s2">&quot;</span>
