            <script type="text/qa-source">
<span class="sd">&quot;&quot;&quot;Standalone access gate test: UC-10 (P1).</span>

<span class="sd">Merged from tests/standalone/ into v030 as part of Phase 2 refactoring.</span>
<span class="sd">Uses the shared v030 fixtures (QA server, UI server, screenshots).</span>

<span class="sd">Screenshots are saved to:</span>
<span class="sd">    sg_send_qa__site/pages/use-cases/access_gate_standalone/screenshots/</span>
<span class="sd">&quot;&quot;&quot;</span>

<span class="kn">import</span><span class="w"> </span><span class="nn">pytest</span>

<span class="n">pytestmark</span> <span class="o">=</span> <span class="n">pytest</span><span class="o">.</span><span class="n">mark</span><span class="o">.</span><span class="n">p1</span>


<span class="k">class</span><span class="w"> </span><span class="nc">TestAccessGate</span><span class="p">:</span>
<span class="w">    </span><span class="sd">&quot;&quot;&quot;Verify the access token gate on the upload page.&quot;&quot;&quot;</span>

    <span class="k">def</span><span class="w"> </span><span class="nf">test_upload_accessible_with_token</span><span class="p">(</span><span class="bp">self</span><span class="p">,</span> <span class="n">page</span><span class="p">,</span> <span class="n">ui_url</span><span class="p">,</span> <span class="n">send_server</span><span class="p">,</span> <span class="n">screenshots</span><span class="p">):</span>
<span class="w">        </span><span class="sd">&quot;&quot;&quot;Providing the correct access token grants access to the upload zone.&quot;&quot;&quot;</span>
        <span class="n">page</span><span class="o">.</span><span class="n">goto</span><span class="p">(</span><span class="sa">f</span><span class="s2">&quot;</span><span class="si">{</span><span class="n">ui_url</span><span class="si">}</span><span class="s2">/en-gb/&quot;</span><span class="p">)</span>
        <span class="n">page</span><span class="o">.</span><span class="n">wait_for_load_state</span><span class="p">(</span><span class="s2">&quot;networkidle&quot;</span><span class="p">)</span>
        <span class="n">page</span><span class="o">.</span><span class="n">wait_for_timeout</span><span class="p">(</span><span class="mi">1000</span><span class="p">)</span>
        <span class="n">screenshots</span><span class="o">.</span><span class="n">capture</span><span class="p">(</span><span class="n">page</span><span class="p">,</span> <span class="s2">&quot;01_landing&quot;</span><span class="p">,</span> <span class="s2">&quot;Landing page (may show gate or upload zone)&quot;</span><span class="p">)</span>

        <span class="c1"># Check if access gate is present</span>
        <span class="n">gate_input</span> <span class="o">=</span> <span class="n">page</span><span class="o">.</span><span class="n">locator</span><span class="p">(</span><span class="s2">&quot;#access-token-input&quot;</span><span class="p">)</span>
        <span class="k">if</span> <span class="n">gate_input</span><span class="o">.</span><span class="n">is_visible</span><span class="p">(</span><span class="n">timeout</span><span class="o">=</span><span class="mi">3000</span><span class="p">):</span>
            <span class="n">gate_input</span><span class="o">.</span><span class="n">fill</span><span class="p">(</span><span class="n">send_server</span><span class="o">.</span><span class="n">access_token</span><span class="p">)</span>
            <span class="n">page</span><span class="o">.</span><span class="n">locator</span><span class="p">(</span><span class="s2">&quot;#access-token-submit&quot;</span><span class="p">)</span><span class="o">.</span><span class="n">click</span><span class="p">()</span>
            <span class="n">page</span><span class="o">.</span><span class="n">wait_for_load_state</span><span class="p">(</span><span class="s2">&quot;networkidle&quot;</span><span class="p">)</span>
            <span class="n">page</span><span class="o">.</span><span class="n">wait_for_timeout</span><span class="p">(</span><span class="mi">1000</span><span class="p">)</span>
            <span class="n">screenshots</span><span class="o">.</span><span class="n">capture</span><span class="p">(</span><span class="n">page</span><span class="p">,</span> <span class="s2">&quot;02_after_token&quot;</span><span class="p">,</span> <span class="s2">&quot;After entering access token&quot;</span><span class="p">)</span>

        <span class="c1"># Upload zone should now be visible</span>
        <span class="n">file_input</span>  <span class="o">=</span> <span class="n">page</span><span class="o">.</span><span class="n">locator</span><span class="p">(</span><span class="s2">&quot;#file-input&quot;</span><span class="p">)</span>
        <span class="n">page_text</span>   <span class="o">=</span> <span class="n">page</span><span class="o">.</span><span class="n">text_content</span><span class="p">(</span><span class="s2">&quot;body&quot;</span><span class="p">)</span> <span class="ow">or</span> <span class="s2">&quot;&quot;</span>
        <span class="n">has_upload</span>  <span class="o">=</span> <span class="n">file_input</span><span class="o">.</span><span class="n">count</span><span class="p">()</span> <span class="o">&gt;</span> <span class="mi">0</span>
        <span class="n">has_keyword</span> <span class="o">=</span> <span class="nb">any</span><span class="p">(</span><span class="n">kw</span> <span class="ow">in</span> <span class="n">page_text</span><span class="o">.</span><span class="n">lower</span><span class="p">()</span> <span class="k">for</span> <span class="n">kw</span> <span class="ow">in</span> <span class="p">[</span><span class="s2">&quot;upload&quot;</span><span class="p">,</span> <span class="s2">&quot;drop&quot;</span><span class="p">,</span> <span class="s2">&quot;browse&quot;</span><span class="p">,</span> <span class="s2">&quot;choose&quot;</span><span class="p">])</span>

        <span class="k">assert</span> <span class="n">has_upload</span> <span class="ow">or</span> <span class="n">has_keyword</span><span class="p">,</span> \
            <span class="s2">&quot;Upload zone not visible after providing valid access token&quot;</span>

    <span class="k">def</span><span class="w"> </span><span class="nf">test_wrong_token_shows_error</span><span class="p">(</span><span class="bp">self</span><span class="p">,</span> <span class="n">page</span><span class="p">,</span> <span class="n">ui_url</span><span class="p">,</span> <span class="n">send_server</span><span class="p">,</span> <span class="n">screenshots</span><span class="p">):</span>
<span class="w">        </span><span class="sd">&quot;&quot;&quot;Providing a wrong access token shows an error.&quot;&quot;&quot;</span>
        <span class="n">page</span><span class="o">.</span><span class="n">goto</span><span class="p">(</span><span class="sa">f</span><span class="s2">&quot;</span><span class="si">{</span><span class="n">ui_url</span><span class="si">}</span><span class="s2">/en-gb/&quot;</span><span class="p">)</span>
        <span class="n">page</span><span class="o">.</span><span class="n">wait_for_load_state</span><span class="p">(</span><span class="s2">&quot;networkidle&quot;</span><span class="p">)</span>
        <span class="n">page</span><span class="o">.</span><span class="n">wait_for_timeout</span><span class="p">(</span><span class="mi">1000</span><span class="p">)</span>

        <span class="n">gate_input</span> <span class="o">=</span> <span class="n">page</span><span class="o">.</span><span class="n">locator</span><span class="p">(</span><span class="s2">&quot;#access-token-input&quot;</span><span class="p">)</span>
        <span class="k">if</span> <span class="n">gate_input</span><span class="o">.</span><span class="n">is_visible</span><span class="p">(</span><span class="n">timeout</span><span class="o">=</span><span class="mi">3000</span><span class="p">):</span>
            <span class="n">gate_input</span><span class="o">.</span><span class="n">fill</span><span class="p">(</span><span class="s2">&quot;wrong-token-12345-xxxxx&quot;</span><span class="p">)</span>
            <span class="n">page</span><span class="o">.</span><span class="n">locator</span><span class="p">(</span><span class="s2">&quot;#access-token-submit&quot;</span><span class="p">)</span><span class="o">.</span><span class="n">click</span><span class="p">()</span>
            <span class="n">page</span><span class="o">.</span><span class="n">wait_for_timeout</span><span class="p">(</span><span class="mi">1000</span><span class="p">)</span>
            <span class="n">screenshots</span><span class="o">.</span><span class="n">capture</span><span class="p">(</span><span class="n">page</span><span class="p">,</span> <span class="s2">&quot;03_wrong_token&quot;</span><span class="p">,</span> <span class="s2">&quot;Wrong token response&quot;</span><span class="p">)</span>

            <span class="n">page_text</span> <span class="o">=</span> <span class="n">page</span><span class="o">.</span><span class="n">text_content</span><span class="p">(</span><span class="s2">&quot;body&quot;</span><span class="p">)</span> <span class="ow">or</span> <span class="s2">&quot;&quot;</span>
            <span class="k">assert</span> <span class="nb">any</span><span class="p">(</span><span class="n">kw</span> <span class="ow">in</span> <span class="n">page_text</span><span class="o">.</span><span class="n">lower</span><span class="p">()</span> <span class="k">for</span> <span class="n">kw</span> <span class="ow">in</span> <span class="p">[</span>
                <span class="s2">&quot;error&quot;</span><span class="p">,</span> <span class="s2">&quot;invalid&quot;</span><span class="p">,</span> <span class="s2">&quot;wrong&quot;</span><span class="p">,</span> <span class="s2">&quot;incorrect&quot;</span><span class="p">,</span> <span class="s2">&quot;denied&quot;</span>
            <span class="p">])</span> <span class="ow">or</span> <span class="n">gate_input</span><span class="o">.</span><span class="n">is_visible</span><span class="p">(),</span> \
                <span class="s2">&quot;No error shown for wrong access token&quot;</span>

    <span class="k">def</span><span class="w"> </span><span class="nf">test_upload_zone_visible_without_gate</span><span class="p">(</span><span class="bp">self</span><span class="p">,</span> <span class="n">page</span><span class="p">,</span> <span class="n">ui_url</span><span class="p">,</span> <span class="n">send_server</span><span class="p">,</span> <span class="n">screenshots</span><span class="p">):</span>
<span class="w">        </span><span class="sd">&quot;&quot;&quot;If no gate is configured, upload zone is immediately visible.&quot;&quot;&quot;</span>
        <span class="n">page</span><span class="o">.</span><span class="n">goto</span><span class="p">(</span><span class="sa">f</span><span class="s2">&quot;</span><span class="si">{</span><span class="n">ui_url</span><span class="si">}</span><span class="s2">/en-gb/&quot;</span><span class="p">)</span>
        <span class="n">page</span><span class="o">.</span><span class="n">wait_for_load_state</span><span class="p">(</span><span class="s2">&quot;networkidle&quot;</span><span class="p">)</span>
        <span class="n">page</span><span class="o">.</span><span class="n">wait_for_timeout</span><span class="p">(</span><span class="mi">1000</span><span class="p">)</span>

        <span class="n">gate_input</span> <span class="o">=</span> <span class="n">page</span><span class="o">.</span><span class="n">locator</span><span class="p">(</span><span class="s2">&quot;#access-token-input&quot;</span><span class="p">)</span>
        <span class="k">if</span> <span class="n">gate_input</span><span class="o">.</span><span class="n">is_visible</span><span class="p">(</span><span class="n">timeout</span><span class="o">=</span><span class="mi">2000</span><span class="p">):</span>
            <span class="n">pytest</span><span class="o">.</span><span class="n">skip</span><span class="p">(</span><span class="s2">&quot;Access gate is active; testing gated flow in other tests&quot;</span><span class="p">)</span>

        <span class="n">file_input</span> <span class="o">=</span> <span class="n">page</span><span class="o">.</span><span class="n">locator</span><span class="p">(</span><span class="s2">&quot;#file-input&quot;</span><span class="p">)</span>
        <span class="n">screenshots</span><span class="o">.</span><span class="n">capture</span><span class="p">(</span><span class="n">page</span><span class="p">,</span> <span class="s2">&quot;04_no_gate&quot;</span><span class="p">,</span> <span class="s2">&quot;Upload zone without gate&quot;</span><span class="p">)</span>
        <span class="n">page_text</span> <span class="o">=</span> <span class="n">page</span><span class="o">.</span><span class="n">text_content</span><span class="p">(</span><span class="s2">&quot;body&quot;</span><span class="p">)</span> <span class="ow">or</span> <span class="s2">&quot;&quot;</span>
        <span class="k">assert</span> <span class="n">file_input</span><span class="o">.</span><span class="n">count</span><span class="p">()</span> <span class="o">&gt;</span> <span class="mi">0</span> <span class="ow">or</span> <span class="nb">any</span><span class="p">(</span><span class="n">kw</span> <span class="ow">in</span> <span class="n">page_text</span><span class="o">.</span><span class="n">lower</span><span class="p">()</span> <span class="k">for</span> <span class="n">kw</span> <span class="ow">in</span> <span class="p">[</span>
            <span class="s2">&quot;upload&quot;</span><span class="p">,</span> <span class="s2">&quot;drop&quot;</span><span class="p">,</span> <span class="s2">&quot;browse&quot;</span>
        <span class="p">]),</span> <span class="s2">&quot;Upload zone not visible (and no gate present)&quot;</span>


<span class="k">class</span><span class="w"> </span><span class="nc">TestAccessGateHealthCheck</span><span class="p">:</span>
<span class="w">    </span><span class="sd">&quot;&quot;&quot;API health check — no browser needed.&quot;&quot;&quot;</span>

    <span class="k">def</span><span class="w"> </span><span class="nf">test_health_endpoint</span><span class="p">(</span><span class="bp">self</span><span class="p">,</span> <span class="n">send_server</span><span class="p">):</span>
<span class="w">        </span><span class="sd">&quot;&quot;&quot;Health endpoint returns 200.&quot;&quot;&quot;</span>
        <span class="kn">import</span><span class="w"> </span><span class="nn">httpx</span>
        <span class="n">r</span> <span class="o">=</span> <span class="n">httpx</span><span class="o">.</span><span class="n">get</span><span class="p">(</span><span class="sa">f</span><span class="s2">&quot;</span><span class="si">{</span><span class="n">send_server</span><span class="o">.</span><span class="n">server_url</span><span class="si">}</span><span class="s2">/info/health&quot;</span><span class="p">)</span>
        <span class="k">assert</span> <span class="n">r</span><span class="o">.</span><span class="n">status_code</span> <span class="o">==</span> <span class="mi">200</span><span class="p">,</span> <span class="sa">f</span><span class="s2">&quot;Health check failed: </span><span class="si">{</span><span class="n">r</span><span class="o">.</span><span class="n">status_code</span><span class="si">}</span><span class="s2">&quot;</span>

            </script>
