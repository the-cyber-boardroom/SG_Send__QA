<span class="sd">&quot;&quot;&quot;UC-10: Access token gate — API-level tests (P1).</span>

<span class="sd">Tests that verify access gate behaviour via direct HTTP calls,</span>
<span class="sd">without a browser.</span>
<span class="sd">&quot;&quot;&quot;</span>

<span class="kn">import</span><span class="w"> </span><span class="nn">httpx</span>
<span class="kn">import</span><span class="w"> </span><span class="nn">pytest</span>

<span class="n">pytestmark</span> <span class="o">=</span> <span class="n">pytest</span><span class="o">.</span><span class="n">mark</span><span class="o">.</span><span class="n">p1</span>


<span class="k">class</span><span class="w"> </span><span class="nc">TestBug__AccessGateTokenPersistence</span><span class="p">:</span>
<span class="w">    </span><span class="sd">&quot;&quot;&quot;Document known/discovered bug: access token counter behaviour.</span>

<span class="sd">    Bug: If the access token counter reaches zero, subsequent requests</span>
<span class="sd">    with the same token should be denied.  This class documents the</span>
<span class="sd">    expected behaviour so we can detect regressions.</span>
<span class="sd">    &quot;&quot;&quot;</span>

    <span class="k">def</span><span class="w"> </span><span class="nf">test_token_counter_in_response</span><span class="p">(</span><span class="bp">self</span><span class="p">,</span> <span class="n">send_server</span><span class="p">):</span>
<span class="w">        </span><span class="sd">&quot;&quot;&quot;Access token info endpoint returns remaining count (if implemented).&quot;&quot;&quot;</span>
        <span class="c1"># Hit the health or info endpoint to see if token info is exposed</span>
        <span class="n">r</span> <span class="o">=</span> <span class="n">httpx</span><span class="o">.</span><span class="n">get</span><span class="p">(</span><span class="sa">f</span><span class="s2">&quot;</span><span class="si">{</span><span class="n">send_server</span><span class="o">.</span><span class="n">server_url</span><span class="si">}</span><span class="s2">/info/health&quot;</span><span class="p">)</span>
        <span class="k">assert</span> <span class="n">r</span><span class="o">.</span><span class="n">status_code</span> <span class="o">==</span> <span class="mi">200</span><span class="p">,</span> <span class="sa">f</span><span class="s2">&quot;Health check failed: </span><span class="si">{</span><span class="n">r</span><span class="o">.</span><span class="n">status_code</span><span class="si">}</span><span class="s2">&quot;</span>
        <span class="c1"># Document: counter management is server-side, not client-side</span>
