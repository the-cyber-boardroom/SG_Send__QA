<span class="sd">&quot;&quot;&quot;UC-11: Route handling + mode switching (P1).</span>

<span class="sd">Test flow:</span>
<span class="sd">  - Upload a zip with images via API</span>
<span class="sd">  - Navigate to /gallery/#hash → verify gallery view</span>
<span class="sd">  - Navigate to /browse/#hash → verify browse view</span>
<span class="sd">  - Navigate to /view/#hash → verify single file view</span>
<span class="sd">  - Navigate to /v/#hash → verify same as /view/ (short URL)</span>
<span class="sd">  - Navigate to /download/#hash → verify auto-detect mode</span>
<span class="sd">  - Verify gallery &quot;Folder view&quot; link → navigates to /browse/</span>
<span class="sd">  - Verify browse &quot;Gallery view&quot; link → navigates to /gallery/</span>
<span class="sd">&quot;&quot;&quot;</span>

<span class="kn">import</span><span class="w"> </span><span class="nn">pytest</span>
<span class="kn">import</span><span class="w"> </span><span class="nn">zipfile</span>
<span class="kn">import</span><span class="w"> </span><span class="nn">io</span>

<span class="n">pytestmark</span> <span class="o">=</span> <span class="n">pytest</span><span class="o">.</span><span class="n">mark</span><span class="o">.</span><span class="n">p1</span>

<span class="n">_PNG_HEADER</span> <span class="o">=</span> <span class="p">(</span>
    <span class="sa">b</span><span class="s1">&#39;</span><span class="se">\x89</span><span class="s1">PNG</span><span class="se">\r\n\x1a\n</span><span class="s1">&#39;</span>
    <span class="sa">b</span><span class="s1">&#39;</span><span class="se">\x00\x00\x00\r</span><span class="s1">IHDR</span><span class="se">\x00\x00\x00\x01\x00\x00\x00\x01</span><span class="s1">&#39;</span>
    <span class="sa">b</span><span class="s1">&#39;</span><span class="se">\x08\x02\x00\x00\x00\x90</span><span class="s1">wS</span><span class="se">\xde</span><span class="s1">&#39;</span>
    <span class="sa">b</span><span class="s1">&#39;</span><span class="se">\x00\x00\x00\x0c</span><span class="s1">IDATx</span><span class="se">\x9c</span><span class="s1">c</span><span class="se">\xf8\x0f\x00\x00\x01\x01\x00\x05\x18\xd8</span><span class="s1">N&#39;</span>
    <span class="sa">b</span><span class="s1">&#39;</span><span class="se">\x00\x00\x00\x00</span><span class="s1">IEND</span><span class="se">\xae</span><span class="s1">B`</span><span class="se">\x82</span><span class="s1">&#39;</span>
<span class="p">)</span>


<span class="k">def</span><span class="w"> </span><span class="nf">_make_zip</span><span class="p">():</span>
    <span class="n">buf</span> <span class="o">=</span> <span class="n">io</span><span class="o">.</span><span class="n">BytesIO</span><span class="p">()</span>
    <span class="k">with</span> <span class="n">zipfile</span><span class="o">.</span><span class="n">ZipFile</span><span class="p">(</span><span class="n">buf</span><span class="p">,</span> <span class="s2">&quot;w&quot;</span><span class="p">)</span> <span class="k">as</span> <span class="n">zf</span><span class="p">:</span>
        <span class="n">zf</span><span class="o">.</span><span class="n">writestr</span><span class="p">(</span><span class="s2">&quot;archive/img1.png&quot;</span><span class="p">,</span> <span class="n">_PNG_HEADER</span><span class="p">)</span>
        <span class="n">zf</span><span class="o">.</span><span class="n">writestr</span><span class="p">(</span><span class="s2">&quot;archive/img2.png&quot;</span><span class="p">,</span> <span class="n">_PNG_HEADER</span><span class="p">)</span>
        <span class="n">zf</span><span class="o">.</span><span class="n">writestr</span><span class="p">(</span><span class="s2">&quot;archive/img3.png&quot;</span><span class="p">,</span> <span class="n">_PNG_HEADER</span><span class="p">)</span>
    <span class="n">buf</span><span class="o">.</span><span class="n">seek</span><span class="p">(</span><span class="mi">0</span><span class="p">)</span>
    <span class="k">return</span> <span class="n">buf</span><span class="o">.</span><span class="n">read</span><span class="p">()</span>


<span class="k">def</span><span class="w"> </span><span class="nf">_open_route</span><span class="p">(</span><span class="n">page</span><span class="p">,</span> <span class="n">url</span><span class="p">:</span> <span class="nb">str</span><span class="p">)</span> <span class="o">-&gt;</span> <span class="kc">None</span><span class="p">:</span>
<span class="w">    </span><span class="sd">&quot;&quot;&quot;Navigate to a download/gallery/browse route and wait for it to settle.</span>

<span class="sd">    Uses networkidle (consistent with browse/gallery/viewer tests that pass in CI).</span>
<span class="sd">    SG/Send renders all visible content in shadow DOM, so body.textContent is</span>
<span class="sd">    always empty — do NOT use expect(body).not_to_be_empty() here.</span>
<span class="sd">    &quot;&quot;&quot;</span>
    <span class="n">page</span><span class="o">.</span><span class="n">goto</span><span class="p">(</span><span class="n">url</span><span class="p">)</span>
    <span class="n">page</span><span class="o">.</span><span class="n">wait_for_load_state</span><span class="p">(</span><span class="s2">&quot;networkidle&quot;</span><span class="p">)</span>
    <span class="n">page</span><span class="o">.</span><span class="n">wait_for_timeout</span><span class="p">(</span><span class="mi">2000</span><span class="p">)</span>


<span class="k">class</span><span class="w"> </span><span class="nc">TestRouteHandling</span><span class="p">:</span>
<span class="w">    </span><span class="sd">&quot;&quot;&quot;Verify that all download routes load correctly and preserve hash.&quot;&quot;&quot;</span>

    <span class="k">def</span><span class="w"> </span><span class="nf">_make_transfer</span><span class="p">(</span><span class="bp">self</span><span class="p">,</span> <span class="n">transfer_helper</span><span class="p">):</span>
        <span class="n">zip_bytes</span> <span class="o">=</span> <span class="n">_make_zip</span><span class="p">()</span>
        <span class="k">return</span> <span class="n">transfer_helper</span><span class="o">.</span><span class="n">upload_encrypted</span><span class="p">(</span><span class="n">zip_bytes</span><span class="p">,</span> <span class="s2">&quot;archive.zip&quot;</span><span class="p">)</span>

    <span class="k">def</span><span class="w"> </span><span class="nf">test_gallery_route</span><span class="p">(</span><span class="bp">self</span><span class="p">,</span> <span class="n">page</span><span class="p">,</span> <span class="n">ui_url</span><span class="p">,</span> <span class="n">transfer_helper</span><span class="p">,</span> <span class="n">screenshots</span><span class="p">):</span>
<span class="w">        </span><span class="sd">&quot;&quot;&quot;GET /en-gb/gallery/#hash loads gallery view.&quot;&quot;&quot;</span>
        <span class="n">tid</span><span class="p">,</span> <span class="n">key_b64</span> <span class="o">=</span> <span class="bp">self</span><span class="o">.</span><span class="n">_make_transfer</span><span class="p">(</span><span class="n">transfer_helper</span><span class="p">)</span>
        <span class="n">_open_route</span><span class="p">(</span><span class="n">page</span><span class="p">,</span> <span class="sa">f</span><span class="s2">&quot;</span><span class="si">{</span><span class="n">ui_url</span><span class="si">}</span><span class="s2">/en-gb/gallery/#</span><span class="si">{</span><span class="n">tid</span><span class="si">}</span><span class="s2">/</span><span class="si">{</span><span class="n">key_b64</span><span class="si">}</span><span class="s2">&quot;</span><span class="p">)</span>
        <span class="n">screenshots</span><span class="o">.</span><span class="n">capture</span><span class="p">(</span><span class="n">page</span><span class="p">,</span> <span class="s2">&quot;01_gallery_route&quot;</span><span class="p">,</span> <span class="s2">&quot;Gallery route loaded&quot;</span><span class="p">)</span>

        <span class="c1"># inner_text avoids false positive from inline scripts containing &quot;error&quot;</span>
        <span class="n">page_text</span> <span class="o">=</span> <span class="n">page</span><span class="o">.</span><span class="n">inner_text</span><span class="p">(</span><span class="s2">&quot;body&quot;</span><span class="p">)</span> <span class="ow">or</span> <span class="s2">&quot;&quot;</span>
        <span class="k">assert</span> <span class="s2">&quot;error&quot;</span> <span class="ow">not</span> <span class="ow">in</span> <span class="n">page_text</span><span class="o">.</span><span class="n">lower</span><span class="p">()</span> <span class="ow">or</span> <span class="nb">len</span><span class="p">(</span><span class="n">page_text</span><span class="p">)</span> <span class="o">&gt;</span> <span class="mi">100</span>

    <span class="k">def</span><span class="w"> </span><span class="nf">test_browse_route</span><span class="p">(</span><span class="bp">self</span><span class="p">,</span> <span class="n">page</span><span class="p">,</span> <span class="n">ui_url</span><span class="p">,</span> <span class="n">transfer_helper</span><span class="p">,</span> <span class="n">screenshots</span><span class="p">):</span>
<span class="w">        </span><span class="sd">&quot;&quot;&quot;GET /en-gb/browse/#hash loads browse view.&quot;&quot;&quot;</span>
        <span class="n">tid</span><span class="p">,</span> <span class="n">key_b64</span> <span class="o">=</span> <span class="bp">self</span><span class="o">.</span><span class="n">_make_transfer</span><span class="p">(</span><span class="n">transfer_helper</span><span class="p">)</span>
        <span class="n">_open_route</span><span class="p">(</span><span class="n">page</span><span class="p">,</span> <span class="sa">f</span><span class="s2">&quot;</span><span class="si">{</span><span class="n">ui_url</span><span class="si">}</span><span class="s2">/en-gb/browse/#</span><span class="si">{</span><span class="n">tid</span><span class="si">}</span><span class="s2">/</span><span class="si">{</span><span class="n">key_b64</span><span class="si">}</span><span class="s2">&quot;</span><span class="p">)</span>
        <span class="n">screenshots</span><span class="o">.</span><span class="n">capture</span><span class="p">(</span><span class="n">page</span><span class="p">,</span> <span class="s2">&quot;02_browse_route&quot;</span><span class="p">,</span> <span class="s2">&quot;Browse route loaded&quot;</span><span class="p">)</span>

        <span class="n">page_text</span> <span class="o">=</span> <span class="n">page</span><span class="o">.</span><span class="n">inner_text</span><span class="p">(</span><span class="s2">&quot;body&quot;</span><span class="p">)</span> <span class="ow">or</span> <span class="s2">&quot;&quot;</span>
        <span class="k">assert</span> <span class="s2">&quot;error&quot;</span> <span class="ow">not</span> <span class="ow">in</span> <span class="n">page_text</span><span class="o">.</span><span class="n">lower</span><span class="p">()</span> <span class="ow">or</span> <span class="nb">len</span><span class="p">(</span><span class="n">page_text</span><span class="p">)</span> <span class="o">&gt;</span> <span class="mi">100</span>

    <span class="k">def</span><span class="w"> </span><span class="nf">test_view_route</span><span class="p">(</span><span class="bp">self</span><span class="p">,</span> <span class="n">page</span><span class="p">,</span> <span class="n">ui_url</span><span class="p">,</span> <span class="n">transfer_helper</span><span class="p">,</span> <span class="n">screenshots</span><span class="p">):</span>
<span class="w">        </span><span class="sd">&quot;&quot;&quot;GET /en-gb/view/#hash loads single-file viewer.&quot;&quot;&quot;</span>
        <span class="n">tid</span><span class="p">,</span> <span class="n">key_b64</span> <span class="o">=</span> <span class="n">transfer_helper</span><span class="o">.</span><span class="n">upload_encrypted</span><span class="p">(</span><span class="sa">b</span><span class="s2">&quot;plain text content&quot;</span><span class="p">,</span> <span class="s2">&quot;note.txt&quot;</span><span class="p">)</span>
        <span class="n">_open_route</span><span class="p">(</span><span class="n">page</span><span class="p">,</span> <span class="sa">f</span><span class="s2">&quot;</span><span class="si">{</span><span class="n">ui_url</span><span class="si">}</span><span class="s2">/en-gb/view/#</span><span class="si">{</span><span class="n">tid</span><span class="si">}</span><span class="s2">/</span><span class="si">{</span><span class="n">key_b64</span><span class="si">}</span><span class="s2">&quot;</span><span class="p">)</span>
        <span class="n">screenshots</span><span class="o">.</span><span class="n">capture</span><span class="p">(</span><span class="n">page</span><span class="p">,</span> <span class="s2">&quot;03_view_route&quot;</span><span class="p">,</span> <span class="s2">&quot;View route loaded&quot;</span><span class="p">)</span>

        <span class="n">page_text</span> <span class="o">=</span> <span class="n">page</span><span class="o">.</span><span class="n">inner_text</span><span class="p">(</span><span class="s2">&quot;body&quot;</span><span class="p">)</span> <span class="ow">or</span> <span class="s2">&quot;&quot;</span>
        <span class="k">assert</span> <span class="s2">&quot;error&quot;</span> <span class="ow">not</span> <span class="ow">in</span> <span class="n">page_text</span><span class="o">.</span><span class="n">lower</span><span class="p">()</span> <span class="ow">or</span> <span class="nb">len</span><span class="p">(</span><span class="n">page_text</span><span class="p">)</span> <span class="o">&gt;</span> <span class="mi">100</span>

    <span class="k">def</span><span class="w"> </span><span class="nf">test_short_v_route</span><span class="p">(</span><span class="bp">self</span><span class="p">,</span> <span class="n">page</span><span class="p">,</span> <span class="n">ui_url</span><span class="p">,</span> <span class="n">transfer_helper</span><span class="p">,</span> <span class="n">screenshots</span><span class="p">):</span>
<span class="w">        </span><span class="sd">&quot;&quot;&quot;/en-gb/v/#hash is equivalent to /en-gb/view/#hash.&quot;&quot;&quot;</span>
        <span class="n">tid</span><span class="p">,</span> <span class="n">key_b64</span> <span class="o">=</span> <span class="n">transfer_helper</span><span class="o">.</span><span class="n">upload_encrypted</span><span class="p">(</span><span class="sa">b</span><span class="s2">&quot;short url test content&quot;</span><span class="p">,</span> <span class="s2">&quot;note.txt&quot;</span><span class="p">)</span>
        <span class="n">_open_route</span><span class="p">(</span><span class="n">page</span><span class="p">,</span> <span class="sa">f</span><span class="s2">&quot;</span><span class="si">{</span><span class="n">ui_url</span><span class="si">}</span><span class="s2">/en-gb/v/#</span><span class="si">{</span><span class="n">tid</span><span class="si">}</span><span class="s2">/</span><span class="si">{</span><span class="n">key_b64</span><span class="si">}</span><span class="s2">&quot;</span><span class="p">)</span>
        <span class="n">screenshots</span><span class="o">.</span><span class="n">capture</span><span class="p">(</span><span class="n">page</span><span class="p">,</span> <span class="s2">&quot;04_short_v_route&quot;</span><span class="p">,</span> <span class="s2">&quot;Short /v/ route loaded&quot;</span><span class="p">)</span>
