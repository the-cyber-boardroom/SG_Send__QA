<span class="sd">&quot;&quot;&quot;UC-08: Single file viewer (P1).</span>

<span class="sd">Test flow:</span>
<span class="sd">  - Upload a markdown file via API, open the download/view link</span>
<span class="sd">  - Verify markdown renders (or content displays)</span>
<span class="sd">  - Verify Share button toggles share panel with download link</span>
<span class="sd">  - Verify Copy copies the URL with key intact</span>
<span class="sd">  - Verify Print button is present</span>
<span class="sd">  - Verify Save locally downloads the file</span>
<span class="sd">&quot;&quot;&quot;</span>

<span class="kn">import</span><span class="w"> </span><span class="nn">pytest</span>

<span class="kn">from</span><span class="w"> </span><span class="nn">playwright.sync_api</span><span class="w"> </span><span class="kn">import</span> <span class="n">expect</span>
<span class="kn">from</span><span class="w"> </span><span class="nn">tests.qa.v030.browser_helpers</span><span class="w"> </span><span class="kn">import</span> <span class="n">goto</span>

<span class="n">pytestmark</span> <span class="o">=</span> <span class="n">pytest</span><span class="o">.</span><span class="n">mark</span><span class="o">.</span><span class="n">p1</span>

<span class="n">MARKDOWN_CONTENT</span> <span class="o">=</span> <span class="sa">b</span><span class="s2">&quot;&quot;&quot;# UC-08 Test Document</span>

<span class="s2">This is a **markdown** file used for the single-file viewer test.</span>

<span class="s2">## Section 1</span>

<span class="s2">- Item A</span>
<span class="s2">- Item B</span>
<span class="s2">- Item C</span>

<span class="s2">## Section 2</span>

<span class="s2">Some *italic* and `inline code`.</span>
<span class="s2">&quot;&quot;&quot;</span>


<span class="k">class</span><span class="w"> </span><span class="nc">TestSingleFileViewer</span><span class="p">:</span>
<span class="w">    </span><span class="sd">&quot;&quot;&quot;Verify the single-file viewer for a markdown upload.&quot;&quot;&quot;</span>

    <span class="k">def</span><span class="w"> </span><span class="nf">_open_viewer</span><span class="p">(</span><span class="bp">self</span><span class="p">,</span> <span class="n">page</span><span class="p">,</span> <span class="n">ui_url</span><span class="p">,</span> <span class="n">transfer_helper</span><span class="p">,</span> <span class="n">route</span><span class="o">=</span><span class="s2">&quot;view&quot;</span><span class="p">):</span>
        <span class="n">tid</span><span class="p">,</span> <span class="n">key_b64</span> <span class="o">=</span> <span class="n">transfer_helper</span><span class="o">.</span><span class="n">upload_encrypted</span><span class="p">(</span><span class="n">MARKDOWN_CONTENT</span><span class="p">,</span> <span class="s2">&quot;test-doc.md&quot;</span><span class="p">)</span>
        <span class="n">view_url</span> <span class="o">=</span> <span class="sa">f</span><span class="s2">&quot;</span><span class="si">{</span><span class="n">ui_url</span><span class="si">}</span><span class="s2">/en-gb/</span><span class="si">{</span><span class="n">route</span><span class="si">}</span><span class="s2">/#</span><span class="si">{</span><span class="n">tid</span><span class="si">}</span><span class="s2">/</span><span class="si">{</span><span class="n">key_b64</span><span class="si">}</span><span class="s2">&quot;</span>
        <span class="n">goto</span><span class="p">(</span><span class="n">page</span><span class="p">,</span> <span class="n">view_url</span><span class="p">)</span>
        <span class="c1"># Wait for page content to be present — JS decryption takes a moment</span>
        <span class="n">expect</span><span class="p">(</span><span class="n">page</span><span class="o">.</span><span class="n">locator</span><span class="p">(</span><span class="s2">&quot;body&quot;</span><span class="p">))</span><span class="o">.</span><span class="n">not_to_be_empty</span><span class="p">(</span><span class="n">timeout</span><span class="o">=</span><span class="mi">10_000</span><span class="p">)</span>
        <span class="k">return</span> <span class="n">tid</span><span class="p">,</span> <span class="n">key_b64</span>

    <span class="k">def</span><span class="w"> </span><span class="nf">test_viewer_page_loads</span><span class="p">(</span><span class="bp">self</span><span class="p">,</span> <span class="n">page</span><span class="p">,</span> <span class="n">ui_url</span><span class="p">,</span> <span class="n">transfer_helper</span><span class="p">,</span> <span class="n">screenshots</span><span class="p">):</span>
<span class="w">        </span><span class="sd">&quot;&quot;&quot;Single-file viewer loads without errors.&quot;&quot;&quot;</span>
        <span class="n">tid</span><span class="p">,</span> <span class="n">key_b64</span> <span class="o">=</span> <span class="bp">self</span><span class="o">.</span><span class="n">_open_viewer</span><span class="p">(</span><span class="n">page</span><span class="p">,</span> <span class="n">ui_url</span><span class="p">,</span> <span class="n">transfer_helper</span><span class="p">)</span>
        <span class="n">screenshots</span><span class="o">.</span><span class="n">capture</span><span class="p">(</span><span class="n">page</span><span class="p">,</span> <span class="s2">&quot;01_viewer_loaded&quot;</span><span class="p">,</span> <span class="s2">&quot;Single file viewer loaded&quot;</span><span class="p">)</span>

        <span class="n">page_text</span> <span class="o">=</span> <span class="n">page</span><span class="o">.</span><span class="n">text_content</span><span class="p">(</span><span class="s2">&quot;body&quot;</span><span class="p">)</span> <span class="ow">or</span> <span class="s2">&quot;&quot;</span>
        <span class="k">assert</span> <span class="s2">&quot;error&quot;</span> <span class="ow">not</span> <span class="ow">in</span> <span class="n">page_text</span><span class="o">.</span><span class="n">lower</span><span class="p">()</span> <span class="ow">or</span> <span class="nb">len</span><span class="p">(</span><span class="n">page_text</span><span class="p">)</span> <span class="o">&gt;</span> <span class="mi">100</span><span class="p">,</span> \
            <span class="s2">&quot;Viewer page shows error or is empty&quot;</span>

    <span class="k">def</span><span class="w"> </span><span class="nf">test_markdown_content_displayed</span><span class="p">(</span><span class="bp">self</span><span class="p">,</span> <span class="n">page</span><span class="p">,</span> <span class="n">ui_url</span><span class="p">,</span> <span class="n">transfer_helper</span><span class="p">,</span> <span class="n">screenshots</span><span class="p">):</span>
<span class="w">        </span><span class="sd">&quot;&quot;&quot;Markdown file content is decrypted and displayed.&quot;&quot;&quot;</span>
        <span class="bp">self</span><span class="o">.</span><span class="n">_open_viewer</span><span class="p">(</span><span class="n">page</span><span class="p">,</span> <span class="n">ui_url</span><span class="p">,</span> <span class="n">transfer_helper</span><span class="p">)</span>
        <span class="n">screenshots</span><span class="o">.</span><span class="n">capture</span><span class="p">(</span><span class="n">page</span><span class="p">,</span> <span class="s2">&quot;02_content&quot;</span><span class="p">,</span> <span class="s2">&quot;Decrypted markdown content&quot;</span><span class="p">)</span>

        <span class="n">page_text</span> <span class="o">=</span> <span class="n">page</span><span class="o">.</span><span class="n">text_content</span><span class="p">(</span><span class="s2">&quot;body&quot;</span><span class="p">)</span> <span class="ow">or</span> <span class="s2">&quot;&quot;</span>
        <span class="c1"># The document heading or content should appear</span>
        <span class="k">assert</span> <span class="s2">&quot;UC-08 Test Document&quot;</span> <span class="ow">in</span> <span class="n">page_text</span> <span class="ow">or</span> <span class="s2">&quot;Section 1&quot;</span> <span class="ow">in</span> <span class="n">page_text</span><span class="p">,</span> \

    <span class="k">def</span><span class="w"> </span><span class="nf">test_share_button_present</span><span class="p">(</span><span class="bp">self</span><span class="p">,</span> <span class="n">page</span><span class="p">,</span> <span class="n">ui_url</span><span class="p">,</span> <span class="n">transfer_helper</span><span class="p">,</span> <span class="n">screenshots</span><span class="p">):</span>
<span class="w">        </span><span class="sd">&quot;&quot;&quot;Share button is present and toggles the share panel.&quot;&quot;&quot;</span>
        <span class="n">tid</span><span class="p">,</span> <span class="n">key_b64</span> <span class="o">=</span> <span class="bp">self</span><span class="o">.</span><span class="n">_open_viewer</span><span class="p">(</span><span class="n">page</span><span class="p">,</span> <span class="n">ui_url</span><span class="p">,</span> <span class="n">transfer_helper</span><span class="p">)</span>
        <span class="n">screenshots</span><span class="o">.</span><span class="n">capture</span><span class="p">(</span><span class="n">page</span><span class="p">,</span> <span class="s2">&quot;03_before_share&quot;</span><span class="p">,</span> <span class="s2">&quot;Before share panel&quot;</span><span class="p">)</span>

        <span class="n">share_btn</span> <span class="o">=</span> <span class="n">page</span><span class="o">.</span><span class="n">locator</span><span class="p">(</span>
            <span class="s2">&quot;button:has-text(&#39;Share&#39;), [class*=&#39;share-btn&#39;], [title*=&#39;share&#39;]&quot;</span>
        <span class="p">)</span><span class="o">.</span><span class="n">first</span>
        <span class="k">if</span> <span class="n">share_btn</span><span class="o">.</span><span class="n">is_visible</span><span class="p">(</span><span class="n">timeout</span><span class="o">=</span><span class="mi">5000</span><span class="p">):</span>

    <span class="k">def</span><span class="w"> </span><span class="nf">test_copy_url_contains_key</span><span class="p">(</span><span class="bp">self</span><span class="p">,</span> <span class="n">page</span><span class="p">,</span> <span class="n">ui_url</span><span class="p">,</span> <span class="n">transfer_helper</span><span class="p">,</span> <span class="n">screenshots</span><span class="p">):</span>

        <span class="n">share_btn</span> <span class="o">=</span> <span class="n">page</span><span class="o">.</span><span class="n">locator</span><span class="p">(</span>
            <span class="s2">&quot;button:has-text(&#39;Share&#39;), [class*=&#39;share-btn&#39;]&quot;</span>
