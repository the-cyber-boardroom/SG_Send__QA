<span class="sd">&quot;&quot;&quot;UC-03: Friendly Token — Simple Token share mode (P0).</span>

<span class="sd">This was a P0 bug — critical to test.</span>

<span class="sd">Flow:</span>
<span class="sd">  1. Upload a file with Simple Token share mode</span>
<span class="sd">  2. Capture the friendly token (word-word-NNNN format)</span>
<span class="sd">  3. Open a new tab to /en-gb/browse/#&lt;friendly-token&gt;</span>
<span class="sd">  4. Verify the token resolves and content decrypts</span>
<span class="sd">&quot;&quot;&quot;</span>
<span class="kn">import</span><span class="w"> </span><span class="nn">re</span>
<span class="kn">from</span><span class="w"> </span><span class="nn">pathlib</span><span class="w">                                                    </span><span class="kn">import</span> <span class="n">Path</span>
<span class="kn">from</span><span class="w"> </span><span class="nn">unittest</span><span class="w">                                                   </span><span class="kn">import</span> <span class="n">TestCase</span>
<span class="kn">import</span><span class="w"> </span><span class="nn">pytest</span>
<span class="kn">from</span><span class="w"> </span><span class="nn">sg_send_qa.browser.SG_Send__Browser__Test_Harness</span><span class="w">         </span><span class="kn">import</span> <span class="n">SG_Send__Browser__Test_Harness</span>
<span class="kn">from</span><span class="w"> </span><span class="nn">sg_send_qa.utils.QA_Screenshot_Capture</span><span class="w">                    </span><span class="kn">import</span> <span class="n">ScreenshotCapture</span>

<span class="n">pytestmark</span> <span class="o">=</span> <span class="n">pytest</span><span class="o">.</span><span class="n">mark</span><span class="o">.</span><span class="n">p0</span>

<span class="n">SAMPLE_CONTENT</span> <span class="o">=</span> <span class="s2">&quot;Friendly token test — UC-03.&quot;</span>
<span class="n">TOKEN_PATTERN</span>  <span class="o">=</span> <span class="n">re</span><span class="o">.</span><span class="n">compile</span><span class="p">(</span><span class="sa">r</span><span class="s2">&quot;\b[a-z]+-[a-z]+-\d</span><span class="si">{4}</span><span class="s2">\b&quot;</span><span class="p">)</span>

<span class="n">_BASE</span>  <span class="o">=</span> <span class="n">Path</span><span class="p">(</span><span class="vm">__file__</span><span class="p">)</span><span class="o">.</span><span class="n">parent</span><span class="o">.</span><span class="n">parent</span><span class="o">.</span><span class="n">parent</span><span class="o">.</span><span class="n">parent</span><span class="o">.</span><span class="n">parent</span> <span class="o">/</span> <span class="s2">&quot;sg_send_qa__site&quot;</span> <span class="o">/</span> <span class="s2">&quot;pages&quot;</span> <span class="o">/</span> <span class="s2">&quot;use-cases&quot;</span>
<span class="n">_GROUP</span> <span class="o">=</span> <span class="s2">&quot;02-upload-share&quot;</span>
<span class="n">_UC</span>    <span class="o">=</span> <span class="s2">&quot;friendly_token&quot;</span>


<span class="k">class</span><span class="w"> </span><span class="nc">test_Friendly_Token</span><span class="p">(</span><span class="n">TestCase</span><span class="p">):</span>
<span class="w">    </span><span class="sd">&quot;&quot;&quot;Validate the Simple Token (friendly token) share mode end-to-end.&quot;&quot;&quot;</span>

    <span class="nd">@classmethod</span>
    <span class="k">def</span><span class="w"> </span><span class="nf">setUpClass</span><span class="p">(</span><span class="bp">cls</span><span class="p">):</span>
        <span class="bp">cls</span><span class="o">.</span><span class="n">harness</span> <span class="o">=</span> <span class="n">SG_Send__Browser__Test_Harness</span><span class="p">()</span><span class="o">.</span><span class="n">headless</span><span class="p">(</span><span class="kc">True</span><span class="p">)</span><span class="o">.</span><span class="n">setup</span><span class="p">()</span>
        <span class="bp">cls</span><span class="o">.</span><span class="n">sg_send</span> <span class="o">=</span> <span class="bp">cls</span><span class="o">.</span><span class="n">harness</span><span class="o">.</span><span class="n">sg_send</span>
        <span class="bp">cls</span><span class="o">.</span><span class="n">harness</span><span class="o">.</span><span class="n">set_access_token</span><span class="p">()</span>

    <span class="nd">@classmethod</span>
    <span class="k">def</span><span class="w"> </span><span class="nf">tearDownClass</span><span class="p">(</span><span class="bp">cls</span><span class="p">):</span>
        <span class="bp">cls</span><span class="o">.</span><span class="n">harness</span><span class="o">.</span><span class="n">teardown</span><span class="p">()</span>

    <span class="k">def</span><span class="w"> </span><span class="nf">_shots</span><span class="p">(</span><span class="bp">self</span><span class="p">,</span> <span class="n">method_name</span><span class="p">,</span> <span class="n">method_doc</span><span class="o">=</span><span class="s2">&quot;&quot;</span><span class="p">):</span>
        <span class="n">shots_dir</span> <span class="o">=</span> <span class="n">_BASE</span> <span class="o">/</span> <span class="n">_GROUP</span> <span class="o">/</span> <span class="n">_UC</span> <span class="o">/</span> <span class="s2">&quot;screenshots&quot;</span>
        <span class="k">return</span> <span class="n">ScreenshotCapture</span><span class="p">(</span>
            <span class="n">use_case</span>    <span class="o">=</span> <span class="n">_UC</span><span class="p">,</span>
            <span class="n">module_name</span> <span class="o">=</span> <span class="s2">&quot;test__friendly_token&quot;</span><span class="p">,</span>
            <span class="n">module_doc</span>  <span class="o">=</span> <span class="vm">__doc__</span><span class="p">,</span>
            <span class="n">method_name</span> <span class="o">=</span> <span class="n">method_name</span><span class="p">,</span>
            <span class="n">method_doc</span>  <span class="o">=</span> <span class="n">method_doc</span><span class="p">,</span>
            <span class="n">shots_dir</span>   <span class="o">=</span> <span class="n">shots_dir</span><span class="p">,</span>
        <span class="p">)</span>

    <span class="k">def</span><span class="w"> </span><span class="nf">_upload_with_simple_token</span><span class="p">(</span><span class="bp">self</span><span class="p">,</span> <span class="n">shots</span><span class="p">,</span> <span class="n">filename</span><span class="o">=</span><span class="s2">&quot;token-test.txt&quot;</span><span class="p">):</span>
<span class="w">        </span><span class="sd">&quot;&quot;&quot;Upload a file with Simple Token mode and return the friendly token string.&quot;&quot;&quot;</span>
        <span class="bp">self</span><span class="o">.</span><span class="n">sg_send</span><span class="o">.</span><span class="n">page__root</span><span class="p">()</span>
        <span class="bp">self</span><span class="o">.</span><span class="n">sg_send</span><span class="o">.</span><span class="n">upload__set_file</span><span class="p">(</span><span class="n">filename</span><span class="p">,</span> <span class="n">SAMPLE_CONTENT</span><span class="o">.</span><span class="n">encode</span><span class="p">())</span>
        <span class="n">shots</span><span class="o">.</span><span class="n">capture</span><span class="p">(</span><span class="bp">self</span><span class="o">.</span><span class="n">sg_send</span><span class="o">.</span><span class="n">raw_page</span><span class="p">(),</span> <span class="s2">&quot;01_file_selected&quot;</span><span class="p">,</span> <span class="s2">&quot;File selected (delivery step active)&quot;</span><span class="p">)</span>

        <span class="bp">self</span><span class="o">.</span><span class="n">sg_send</span><span class="o">.</span><span class="n">upload__click_next</span><span class="p">()</span>
        <span class="bp">self</span><span class="o">.</span><span class="n">sg_send</span><span class="o">.</span><span class="n">upload__select_share_mode</span><span class="p">(</span><span class="s2">&quot;token&quot;</span><span class="p">)</span>
        <span class="n">shots</span><span class="o">.</span><span class="n">capture</span><span class="p">(</span><span class="bp">self</span><span class="o">.</span><span class="n">sg_send</span><span class="o">.</span><span class="n">raw_page</span><span class="p">(),</span> <span class="s2">&quot;02_simple_token_selected&quot;</span><span class="p">,</span> <span class="s2">&quot;Simple Token selected&quot;</span><span class="p">)</span>

        <span class="bp">self</span><span class="o">.</span><span class="n">sg_send</span><span class="o">.</span><span class="n">upload__click_next</span><span class="p">()</span>
        <span class="bp">self</span><span class="o">.</span><span class="n">sg_send</span><span class="o">.</span><span class="n">upload__wait_for_complete</span><span class="p">()</span>
        <span class="n">shots</span><span class="o">.</span><span class="n">capture</span><span class="p">(</span><span class="bp">self</span><span class="o">.</span><span class="n">sg_send</span><span class="o">.</span><span class="n">raw_page</span><span class="p">(),</span> <span class="s2">&quot;03_upload_complete&quot;</span><span class="p">,</span> <span class="s2">&quot;Upload complete&quot;</span><span class="p">)</span>

        <span class="k">return</span> <span class="bp">self</span><span class="o">.</span><span class="n">sg_send</span><span class="o">.</span><span class="n">upload__get_friendly_token</span><span class="p">()</span>

    <span class="k">def</span><span class="w"> </span><span class="nf">test__01__friendly_token_upload_and_resolve</span><span class="p">(</span><span class="bp">self</span><span class="p">):</span>
<span class="w">        </span><span class="sd">&quot;&quot;&quot;Upload with Simple Token mode, then resolve the friendly token in a new tab.&quot;&quot;&quot;</span>
        <span class="n">shots</span>         <span class="o">=</span> <span class="bp">self</span><span class="o">.</span><span class="n">_shots</span><span class="p">(</span><span class="s2">&quot;test__01__friendly_token_upload_and_resolve&quot;</span><span class="p">,</span>
                                    <span class="bp">self</span><span class="o">.</span><span class="n">test__01__friendly_token_upload_and_resolve</span><span class="o">.</span><span class="vm">__doc__</span><span class="p">)</span>
        <span class="n">friendly_token</span> <span class="o">=</span> <span class="bp">self</span><span class="o">.</span><span class="n">_upload_with_simple_token</span><span class="p">(</span><span class="n">shots</span><span class="p">)</span>

        <span class="k">assert</span> <span class="n">friendly_token</span><span class="p">,</span> <span class="s2">&quot;No friendly token found after upload&quot;</span>
        <span class="k">assert</span> <span class="n">TOKEN_PATTERN</span><span class="o">.</span><span class="n">search</span><span class="p">(</span><span class="n">friendly_token</span><span class="p">),</span> \
            <span class="sa">f</span><span class="s2">&quot;Token does not match word-word-NNNN pattern: </span><span class="si">{</span><span class="n">friendly_token</span><span class="si">!r}</span><span class="s2">&quot;</span>
        <span class="n">shots</span><span class="o">.</span><span class="n">capture</span><span class="p">(</span><span class="bp">self</span><span class="o">.</span><span class="n">sg_send</span><span class="o">.</span><span class="n">raw_page</span><span class="p">(),</span> <span class="s2">&quot;05_token_captured&quot;</span><span class="p">,</span>
                      <span class="sa">f</span><span class="s2">&quot;Token: </span><span class="si">{</span><span class="n">friendly_token</span><span class="si">}</span><span class="s2">&quot;</span><span class="p">)</span>

        <span class="c1"># Resolve in new page</span>
        <span class="n">new_page</span> <span class="o">=</span> <span class="bp">self</span><span class="o">.</span><span class="n">sg_send</span><span class="o">.</span><span class="n">raw_page</span><span class="p">()</span><span class="o">.</span><span class="n">context</span><span class="o">.</span><span class="n">new_page</span><span class="p">()</span>
        <span class="k">try</span><span class="p">:</span>
            <span class="kn">from</span><span class="w"> </span><span class="nn">tests.qa.v030.browser_helpers</span><span class="w"> </span><span class="kn">import</span> <span class="n">goto</span><span class="p">,</span> <span class="n">wait_for_download_states</span>
            <span class="n">goto</span><span class="p">(</span><span class="n">new_page</span><span class="p">,</span> <span class="sa">f</span><span class="s2">&quot;</span><span class="si">{</span><span class="bp">self</span><span class="o">.</span><span class="n">harness</span><span class="o">.</span><span class="n">ui_url</span><span class="p">()</span><span class="si">}</span><span class="s2">/en-gb/browse/#</span><span class="si">{</span><span class="n">friendly_token</span><span class="si">}</span><span class="s2">&quot;</span><span class="p">)</span>
            <span class="n">wait_for_download_states</span><span class="p">(</span><span class="n">new_page</span><span class="p">,</span> <span class="p">[</span><span class="s2">&quot;complete&quot;</span><span class="p">,</span> <span class="s2">&quot;error&quot;</span><span class="p">])</span>
            <span class="n">shots</span><span class="o">.</span><span class="n">capture</span><span class="p">(</span><span class="n">new_page</span><span class="p">,</span> <span class="s2">&quot;06_token_resolved&quot;</span><span class="p">,</span> <span class="sa">f</span><span class="s2">&quot;Token &#39;</span><span class="si">{</span><span class="n">friendly_token</span><span class="si">}</span><span class="s2">&#39; resolved&quot;</span><span class="p">)</span>
            <span class="n">resolve_text</span> <span class="o">=</span> <span class="n">new_page</span><span class="o">.</span><span class="n">text_content</span><span class="p">(</span><span class="s2">&quot;body&quot;</span><span class="p">)</span> <span class="ow">or</span> <span class="s2">&quot;&quot;</span>
            <span class="k">assert</span> <span class="s2">&quot;not found&quot;</span> <span class="ow">not</span> <span class="ow">in</span> <span class="n">resolve_text</span><span class="o">.</span><span class="n">lower</span><span class="p">(),</span> \
                <span class="sa">f</span><span class="s2">&quot;Token resolution failed — &#39;not found&#39; error. Token: </span><span class="si">{</span><span class="n">friendly_token</span><span class="si">}</span><span class="s2">&quot;</span>
        <span class="k">finally</span><span class="p">:</span>
            <span class="n">new_page</span><span class="o">.</span><span class="n">close</span><span class="p">()</span>
        <span class="n">shots</span><span class="o">.</span><span class="n">save_metadata</span><span class="p">()</span>

    <span class="k">def</span><span class="w"> </span><span class="nf">test__02__friendly_token_format</span><span class="p">(</span><span class="bp">self</span><span class="p">):</span>
<span class="w">        </span><span class="sd">&quot;&quot;&quot;Verify the friendly token matches the word-word-NNNN pattern.&quot;&quot;&quot;</span>
        <span class="n">shots</span>          <span class="o">=</span> <span class="bp">self</span><span class="o">.</span><span class="n">_shots</span><span class="p">(</span><span class="s2">&quot;test__02__friendly_token_format&quot;</span><span class="p">,</span>
                                     <span class="bp">self</span><span class="o">.</span><span class="n">test__02__friendly_token_format</span><span class="o">.</span><span class="vm">__doc__</span><span class="p">)</span>
        <span class="n">friendly_token</span> <span class="o">=</span> <span class="bp">self</span><span class="o">.</span><span class="n">_upload_with_simple_token</span><span class="p">(</span><span class="n">shots</span><span class="p">,</span> <span class="n">filename</span><span class="o">=</span><span class="s2">&quot;format-test.txt&quot;</span><span class="p">)</span>
