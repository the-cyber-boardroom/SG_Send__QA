<span class="sd">&quot;&quot;&quot;UC-09: Manual token/ID entry form (P1).</span>

<span class="sd">Test flow:</span>
<span class="sd">  - Navigate to /en-gb/download/ with no hash fragment</span>
<span class="sd">  - Verify entry form appears (input + &quot;Decrypt &amp; Download&quot; button)</span>
<span class="sd">  - Enter a valid friendly token (from a previous upload)</span>
<span class="sd">  - Verify it resolves and decrypts</span>
<span class="sd">  - Enter a bogus token → verify error message</span>
<span class="sd">&quot;&quot;&quot;</span>

<span class="kn">import</span><span class="w"> </span><span class="nn">pytest</span>
<span class="kn">import</span><span class="w"> </span><span class="nn">re</span>

<span class="kn">from</span><span class="w"> </span><span class="nn">playwright.sync_api</span><span class="w"> </span><span class="kn">import</span> <span class="n">expect</span>
<span class="kn">from</span><span class="w"> </span><span class="nn">tests.qa.v030.browser_helpers</span><span class="w"> </span><span class="kn">import</span> <span class="n">goto</span>

<span class="n">pytestmark</span> <span class="o">=</span> <span class="n">pytest</span><span class="o">.</span><span class="n">mark</span><span class="o">.</span><span class="n">p1</span>

<span class="n">SAMPLE_CONTENT</span> <span class="o">=</span> <span class="sa">b</span><span class="s2">&quot;UC-09 manual entry test content.&quot;</span>


<span class="k">class</span><span class="w"> </span><span class="nc">TestManualEntryForm</span><span class="p">:</span>
<span class="w">    </span><span class="sd">&quot;&quot;&quot;Verify the manual token/ID entry form at /en-gb/download/ with no hash.&quot;&quot;&quot;</span>

    <span class="k">def</span><span class="w"> </span><span class="nf">test_entry_form_shown_without_hash</span><span class="p">(</span><span class="bp">self</span><span class="p">,</span> <span class="n">page</span><span class="p">,</span> <span class="n">ui_url</span><span class="p">,</span> <span class="n">screenshots</span><span class="p">):</span>
<span class="w">        </span><span class="sd">&quot;&quot;&quot;Navigating to /en-gb/download/ with no hash shows the entry form.&quot;&quot;&quot;</span>
        <span class="n">goto</span><span class="p">(</span><span class="n">page</span><span class="p">,</span> <span class="sa">f</span><span class="s2">&quot;</span><span class="si">{</span><span class="n">ui_url</span><span class="si">}</span><span class="s2">/en-gb/download/&quot;</span><span class="p">)</span>
        <span class="c1"># Wait for form to render</span>
        <span class="n">entry_input</span> <span class="o">=</span> <span class="n">page</span><span class="o">.</span><span class="n">locator</span><span class="p">(</span><span class="s2">&quot;input[type=&#39;text&#39;], input[type=&#39;search&#39;], input&quot;</span><span class="p">)</span><span class="o">.</span><span class="n">first</span>
        <span class="n">entry_input</span><span class="o">.</span><span class="n">wait_for</span><span class="p">(</span><span class="n">state</span><span class="o">=</span><span class="s2">&quot;visible&quot;</span><span class="p">,</span> <span class="n">timeout</span><span class="o">=</span><span class="mi">5000</span><span class="p">)</span>
        <span class="n">screenshots</span><span class="o">.</span><span class="n">capture</span><span class="p">(</span><span class="n">page</span><span class="p">,</span> <span class="s2">&quot;01_entry_form&quot;</span><span class="p">,</span> <span class="s2">&quot;Manual entry form without hash&quot;</span><span class="p">)</span>

        <span class="k">assert</span> <span class="n">entry_input</span><span class="o">.</span><span class="n">is_visible</span><span class="p">(),</span> \
            <span class="s2">&quot;Entry form input not visible at /en-gb/download/ without hash&quot;</span>

    <span class="k">def</span><span class="w"> </span><span class="nf">test_entry_form_has_decrypt_button</span><span class="p">(</span><span class="bp">self</span><span class="p">,</span> <span class="n">page</span><span class="p">,</span> <span class="n">ui_url</span><span class="p">,</span> <span class="n">screenshots</span><span class="p">):</span>
<span class="w">        </span><span class="sd">&quot;&quot;&quot;Entry form has a Decrypt &amp; Download (or similar) button.&quot;&quot;&quot;</span>
        <span class="n">goto</span><span class="p">(</span><span class="n">page</span><span class="p">,</span> <span class="sa">f</span><span class="s2">&quot;</span><span class="si">{</span><span class="n">ui_url</span><span class="si">}</span><span class="s2">/en-gb/download/&quot;</span><span class="p">)</span>
        <span class="n">page</span><span class="o">.</span><span class="n">locator</span><span class="p">(</span><span class="s2">&quot;body&quot;</span><span class="p">)</span><span class="o">.</span><span class="n">wait_for</span><span class="p">(</span><span class="n">state</span><span class="o">=</span><span class="s2">&quot;visible&quot;</span><span class="p">)</span>
        <span class="n">screenshots</span><span class="o">.</span><span class="n">capture</span><span class="p">(</span><span class="n">page</span><span class="p">,</span> <span class="s2">&quot;02_decrypt_button&quot;</span><span class="p">,</span> <span class="s2">&quot;Entry form with decrypt button&quot;</span><span class="p">)</span>

        <span class="n">page_text</span> <span class="o">=</span> <span class="n">page</span><span class="o">.</span><span class="n">text_content</span><span class="p">(</span><span class="s2">&quot;body&quot;</span><span class="p">)</span> <span class="ow">or</span> <span class="s2">&quot;&quot;</span>
        <span class="k">assert</span> <span class="nb">any</span><span class="p">(</span><span class="n">kw</span> <span class="ow">in</span> <span class="n">page_text</span><span class="o">.</span><span class="n">lower</span><span class="p">()</span> <span class="k">for</span> <span class="n">kw</span> <span class="ow">in</span> <span class="p">[</span><span class="s2">&quot;decrypt&quot;</span><span class="p">,</span> <span class="s2">&quot;download&quot;</span><span class="p">,</span> <span class="s2">&quot;open&quot;</span><span class="p">]),</span> \
            <span class="s2">&quot;No decrypt/download button found on entry form&quot;</span>

    <span class="k">def</span><span class="w"> </span><span class="nf">test_bogus_token_shows_error</span><span class="p">(</span><span class="bp">self</span><span class="p">,</span> <span class="n">page</span><span class="p">,</span> <span class="n">ui_url</span><span class="p">,</span> <span class="n">screenshots</span><span class="p">):</span>
<span class="w">        </span><span class="sd">&quot;&quot;&quot;Entering a bogus token shows an error (not a crash).&quot;&quot;&quot;</span>
        <span class="n">goto</span><span class="p">(</span><span class="n">page</span><span class="p">,</span> <span class="sa">f</span><span class="s2">&quot;</span><span class="si">{</span><span class="n">ui_url</span><span class="si">}</span><span class="s2">/en-gb/download/&quot;</span><span class="p">)</span>

        <span class="n">entry_input</span> <span class="o">=</span> <span class="n">page</span><span class="o">.</span><span class="n">locator</span><span class="p">(</span><span class="s2">&quot;input[type=&#39;text&#39;], input&quot;</span><span class="p">)</span><span class="o">.</span><span class="n">first</span>
        <span class="k">if</span> <span class="n">entry_input</span><span class="o">.</span><span class="n">is_visible</span><span class="p">(</span><span class="n">timeout</span><span class="o">=</span><span class="mi">5000</span><span class="p">):</span>
            <span class="n">entry_input</span><span class="o">.</span><span class="n">fill</span><span class="p">(</span><span class="s2">&quot;bogus-token-9999&quot;</span><span class="p">)</span>
            <span class="n">entry_input</span><span class="o">.</span><span class="n">press</span><span class="p">(</span><span class="s2">&quot;Enter&quot;</span><span class="p">)</span>
            <span class="c1"># Wait for error feedback to appear</span>
            <span class="n">error_locator</span> <span class="o">=</span> <span class="n">page</span><span class="o">.</span><span class="n">locator</span><span class="p">(</span>
                <span class="s2">&quot;[class*=&#39;error&#39;], [class*=&#39;alert&#39;], [role=&#39;alert&#39;], &quot;</span>
                <span class="s2">&quot;p:has-text(&#39;error&#39;), p:has-text(&#39;not found&#39;), p:has-text(&#39;invalid&#39;)&quot;</span>
            <span class="p">)</span><span class="o">.</span><span class="n">first</span>
            <span class="k">try</span><span class="p">:</span>
                <span class="n">error_locator</span><span class="o">.</span><span class="n">wait_for</span><span class="p">(</span><span class="n">state</span><span class="o">=</span><span class="s2">&quot;visible&quot;</span><span class="p">,</span> <span class="n">timeout</span><span class="o">=</span><span class="mi">5000</span><span class="p">)</span>
            <span class="k">except</span> <span class="ne">Exception</span><span class="p">:</span>
                <span class="k">pass</span>  <span class="c1"># fallback: check body text below</span>
            <span class="n">screenshots</span><span class="o">.</span><span class="n">capture</span><span class="p">(</span><span class="n">page</span><span class="p">,</span> <span class="s2">&quot;03_bogus_token_error&quot;</span><span class="p">,</span> <span class="s2">&quot;Error after bogus token&quot;</span><span class="p">)</span>

            <span class="n">page_text</span> <span class="o">=</span> <span class="n">page</span><span class="o">.</span><span class="n">text_content</span><span class="p">(</span><span class="s2">&quot;body&quot;</span><span class="p">)</span> <span class="ow">or</span> <span class="s2">&quot;&quot;</span>
            <span class="c1"># Should show some kind of error feedback</span>
            <span class="k">assert</span> <span class="nb">any</span><span class="p">(</span><span class="n">kw</span> <span class="ow">in</span> <span class="n">page_text</span><span class="o">.</span><span class="n">lower</span><span class="p">()</span> <span class="k">for</span> <span class="n">kw</span> <span class="ow">in</span> <span class="p">[</span>
                <span class="s2">&quot;error&quot;</span><span class="p">,</span> <span class="s2">&quot;not found&quot;</span><span class="p">,</span> <span class="s2">&quot;invalid&quot;</span><span class="p">,</span> <span class="s2">&quot;failed&quot;</span><span class="p">,</span> <span class="s2">&quot;wrong&quot;</span>
            <span class="p">]),</span> <span class="sa">f</span><span class="s2">&quot;No error shown for bogus token. Page text: </span><span class="si">{</span><span class="n">page_text</span><span class="p">[:</span><span class="mi">300</span><span class="p">]</span><span class="si">}</span><span class="s2">&quot;</span>

    <span class="k">def</span><span class="w"> </span><span class="nf">test_valid_transfer_id_resolves</span><span class="p">(</span><span class="bp">self</span><span class="p">,</span> <span class="n">page</span><span class="p">,</span> <span class="n">ui_url</span><span class="p">,</span> <span class="n">transfer_helper</span><span class="p">,</span> <span class="n">screenshots</span><span class="p">):</span>
<span class="w">        </span><span class="sd">&quot;&quot;&quot;Entering a valid transfer ID resolves and shows the file.&quot;&quot;&quot;</span>
        <span class="c1"># Create a real transfer via API</span>
        <span class="n">tid</span><span class="p">,</span> <span class="n">key_b64</span> <span class="o">=</span> <span class="n">transfer_helper</span><span class="o">.</span><span class="n">upload_encrypted</span><span class="p">(</span><span class="n">SAMPLE_CONTENT</span><span class="p">,</span> <span class="s2">&quot;uc09-test.txt&quot;</span><span class="p">)</span>

        <span class="c1"># Navigate to entry form and type the transfer ID</span>
        <span class="n">goto</span><span class="p">(</span><span class="n">page</span><span class="p">,</span> <span class="sa">f</span><span class="s2">&quot;</span><span class="si">{</span><span class="n">ui_url</span><span class="si">}</span><span class="s2">/en-gb/download/&quot;</span><span class="p">)</span>

        <span class="n">entry_input</span> <span class="o">=</span> <span class="n">page</span><span class="o">.</span><span class="n">locator</span><span class="p">(</span><span class="s2">&quot;input[type=&#39;text&#39;], input&quot;</span><span class="p">)</span><span class="o">.</span><span class="n">first</span>
        <span class="k">if</span> <span class="n">entry_input</span><span class="o">.</span><span class="n">is_visible</span><span class="p">(</span><span class="n">timeout</span><span class="o">=</span><span class="mi">5000</span><span class="p">):</span>
            <span class="c1"># Try the combined hash format (id/key) — what the user would paste</span>
            <span class="n">entry_input</span><span class="o">.</span><span class="n">fill</span><span class="p">(</span><span class="sa">f</span><span class="s2">&quot;</span><span class="si">{</span><span class="n">tid</span><span class="si">}</span><span class="s2">/</span><span class="si">{</span><span class="n">key_b64</span><span class="si">}</span><span class="s2">&quot;</span><span class="p">)</span>
            <span class="n">entry_input</span><span class="o">.</span><span class="n">press</span><span class="p">(</span><span class="s2">&quot;Enter&quot;</span><span class="p">)</span>
            <span class="c1"># Wait for page to advance past the entry form</span>
            <span class="k">try</span><span class="p">:</span>
                <span class="n">expect</span><span class="p">(</span><span class="n">page</span><span class="o">.</span><span class="n">locator</span><span class="p">(</span><span class="s2">&quot;body&quot;</span><span class="p">))</span><span class="o">.</span><span class="n">to_contain_text</span><span class="p">(</span>
                    <span class="n">SAMPLE_CONTENT</span><span class="o">.</span><span class="n">decode</span><span class="p">(),</span> <span class="n">timeout</span><span class="o">=</span><span class="mi">10_000</span>
                <span class="p">)</span>
            <span class="k">except</span> <span class="ne">Exception</span><span class="p">:</span>
                <span class="k">pass</span>  <span class="c1"># content might render differently; assertion below handles it</span>
            <span class="n">screenshots</span><span class="o">.</span><span class="n">capture</span><span class="p">(</span><span class="n">page</span><span class="p">,</span> <span class="s2">&quot;04_valid_id_resolved&quot;</span><span class="p">,</span> <span class="s2">&quot;Valid transfer ID resolved&quot;</span><span class="p">)</span>

            <span class="n">page_text</span> <span class="o">=</span> <span class="n">page</span><span class="o">.</span><span class="n">text_content</span><span class="p">(</span><span class="s2">&quot;body&quot;</span><span class="p">)</span> <span class="ow">or</span> <span class="s2">&quot;&quot;</span>
            <span class="c1"># Page should advance (no longer just the entry form)</span>
            <span class="k">assert</span> <span class="s2">&quot;not found&quot;</span> <span class="ow">not</span> <span class="ow">in</span> <span class="n">page_text</span><span class="o">.</span><span class="n">lower</span><span class="p">()</span> <span class="ow">or</span> <span class="nb">len</span><span class="p">(</span><span class="n">page_text</span><span class="p">)</span> <span class="o">&gt;</span> <span class="mi">200</span><span class="p">,</span> \
                <span class="sa">f</span><span class="s2">&quot;Transfer ID did not resolve. Page text: </span><span class="si">{</span><span class="n">page_text</span><span class="p">[:</span><span class="mi">300</span><span class="p">]</span><span class="si">}</span><span class="s2">&quot;</span>

    <span class="k">def</span><span class="w"> </span><span class="nf">test_hash_navigation_to_download</span><span class="p">(</span><span class="bp">self</span><span class="p">,</span> <span class="n">page</span><span class="p">,</span> <span class="n">ui_url</span><span class="p">,</span> <span class="n">transfer_helper</span><span class="p">,</span> <span class="n">screenshots</span><span class="p">):</span>
<span class="w">        </span><span class="sd">&quot;&quot;&quot;Navigating directly to /en-gb/download/#id/key auto-decrypts (P1).&quot;&quot;&quot;</span>
        <span class="n">tid</span><span class="p">,</span> <span class="n">key_b64</span> <span class="o">=</span> <span class="n">transfer_helper</span><span class="o">.</span><span class="n">upload_encrypted</span><span class="p">(</span><span class="n">SAMPLE_CONTENT</span><span class="p">,</span> <span class="s2">&quot;uc09-direct.txt&quot;</span><span class="p">)</span>

        <span class="n">page</span><span class="o">.</span><span class="n">goto</span><span class="p">(</span><span class="sa">f</span><span class="s2">&quot;</span><span class="si">{</span><span class="n">ui_url</span><span class="si">}</span><span class="s2">/en-gb/download/#</span><span class="si">{</span><span class="n">tid</span><span class="si">}</span><span class="s2">/</span><span class="si">{</span><span class="n">key_b64</span><span class="si">}</span><span class="s2">&quot;</span><span class="p">)</span>
        <span class="n">page</span><span class="o">.</span><span class="n">wait_for_load_state</span><span class="p">(</span><span class="s2">&quot;networkidle&quot;</span><span class="p">)</span>
