<span class="sd">&quot;&quot;&quot;UC-05: Separate Key share mode (P0).</span>

<span class="sd">Flow:</span>
<span class="sd">  1. Upload a file with Separate Key share mode</span>
<span class="sd">  2. Get a link (no key in hash) and the key separately</span>
<span class="sd">  3. Open the link → verify &quot;ready&quot; state with key input</span>
<span class="sd">  4. Paste the key, click Decrypt</span>
<span class="sd">  5. Verify content displays</span>
<span class="sd">  6. Try a wrong key → verify error message</span>
<span class="sd">&quot;&quot;&quot;</span>

<span class="kn">import</span><span class="w"> </span><span class="nn">pytest</span>
<span class="kn">import</span><span class="w"> </span><span class="nn">base64</span>
<span class="kn">import</span><span class="w"> </span><span class="nn">os</span>

<span class="n">pytestmark</span> <span class="o">=</span> <span class="n">pytest</span><span class="o">.</span><span class="n">mark</span><span class="o">.</span><span class="n">p0</span>

<span class="n">SAMPLE_CONTENT</span> <span class="o">=</span> <span class="s2">&quot;Separate key test — UC-05.&quot;</span>


<span class="k">class</span><span class="w"> </span><span class="nc">TestSeparateKey</span><span class="p">:</span>
<span class="w">    </span><span class="sd">&quot;&quot;&quot;Validate the Separate Key share mode end-to-end.&quot;&quot;&quot;</span>

    <span class="nd">@pytest</span><span class="o">.</span><span class="n">mark</span><span class="o">.</span><span class="n">xfail</span><span class="p">(</span>
        <span class="n">reason</span><span class="o">=</span><span class="p">(</span>
            <span class="s2">&quot;BUG: After entering the correct key and clicking Decrypt, the decrypted &quot;</span>
            <span class="s2">&quot;file content is not visible in page.text_content(&#39;body&#39;). The app likely &quot;</span>
            <span class="s2">&quot;renders the viewer in a shadow DOM or triggers a download rather than &quot;</span>
            <span class="s2">&quot;showing content inline. See: pages/known-bugs/separate_key_decrypt_content/&quot;</span>
        <span class="p">),</span>
        <span class="n">strict</span><span class="o">=</span><span class="kc">True</span><span class="p">,</span>
    <span class="p">)</span>
    <span class="k">def</span><span class="w"> </span><span class="nf">test_separate_key_decrypt_via_api</span><span class="p">(</span><span class="bp">self</span><span class="p">,</span> <span class="n">page</span><span class="p">,</span> <span class="n">ui_url</span><span class="p">,</span> <span class="n">transfer_helper</span><span class="p">,</span> <span class="n">screenshots</span><span class="p">):</span>
<span class="w">        </span><span class="sd">&quot;&quot;&quot;Create a transfer via API, open link without key, enter key manually.&quot;&quot;&quot;</span>
        <span class="n">tid</span><span class="p">,</span> <span class="n">key_b64</span> <span class="o">=</span> <span class="n">transfer_helper</span><span class="o">.</span><span class="n">upload_encrypted</span><span class="p">(</span>
            <span class="n">plaintext</span><span class="o">=</span><span class="n">SAMPLE_CONTENT</span><span class="o">.</span><span class="n">encode</span><span class="p">(),</span>
            <span class="n">filename</span><span class="o">=</span><span class="s2">&quot;separate-key-test.txt&quot;</span><span class="p">,</span>
        <span class="p">)</span>

        <span class="c1"># --- Open the download link WITHOUT the key in the hash ---</span>
        <span class="n">page</span><span class="o">.</span><span class="n">goto</span><span class="p">(</span><span class="sa">f</span><span class="s2">&quot;</span><span class="si">{</span><span class="n">ui_url</span><span class="si">}</span><span class="s2">/en-gb/download/#</span><span class="si">{</span><span class="n">tid</span><span class="si">}</span><span class="s2">&quot;</span><span class="p">)</span>
        <span class="n">page</span><span class="o">.</span><span class="n">wait_for_load_state</span><span class="p">(</span><span class="s2">&quot;networkidle&quot;</span><span class="p">)</span>
        <span class="n">page</span><span class="o">.</span><span class="n">wait_for_timeout</span><span class="p">(</span><span class="mi">3000</span><span class="p">)</span>
        <span class="n">screenshots</span><span class="o">.</span><span class="n">capture</span><span class="p">(</span><span class="n">page</span><span class="p">,</span> <span class="s2">&quot;01_ready_state&quot;</span><span class="p">,</span> <span class="s2">&quot;Download page — ready state, key input visible&quot;</span><span class="p">)</span>

        <span class="c1"># --- Verify the key input is visible ---</span>
        <span class="n">key_input</span> <span class="o">=</span> <span class="n">page</span><span class="o">.</span><span class="n">locator</span><span class="p">(</span>
            <span class="s2">&quot;input[type=&#39;password&#39;], input[type=&#39;text&#39;][placeholder*=&#39;key&#39;], &quot;</span>
            <span class="s2">&quot;input[placeholder*=&#39;Key&#39;], input[placeholder*=&#39;decrypt&#39;]&quot;</span>
        <span class="p">)</span><span class="o">.</span><span class="n">first</span>
        <span class="k">assert</span> <span class="n">key_input</span><span class="o">.</span><span class="n">is_visible</span><span class="p">(</span><span class="n">timeout</span><span class="o">=</span><span class="mi">5000</span><span class="p">),</span> <span class="s2">&quot;Key input field not visible on download page&quot;</span>

        <span class="c1"># --- Verify transfer info is shown (size, upload time) ---</span>
        <span class="n">body_text</span> <span class="o">=</span> <span class="n">page</span><span class="o">.</span><span class="n">text_content</span><span class="p">(</span><span class="s2">&quot;body&quot;</span><span class="p">)</span> <span class="ow">or</span> <span class="s2">&quot;&quot;</span>
        <span class="c1"># The page should show some transfer metadata</span>
        <span class="n">screenshots</span><span class="o">.</span><span class="n">capture</span><span class="p">(</span><span class="n">page</span><span class="p">,</span> <span class="s2">&quot;02_transfer_info&quot;</span><span class="p">,</span> <span class="s2">&quot;Transfer info displayed before key entry&quot;</span><span class="p">)</span>

        <span class="c1"># --- Enter the correct key and decrypt ---</span>
        <span class="n">key_input</span><span class="o">.</span><span class="n">fill</span><span class="p">(</span><span class="n">key_b64</span><span class="p">)</span>
        <span class="n">screenshots</span><span class="o">.</span><span class="n">capture</span><span class="p">(</span><span class="n">page</span><span class="p">,</span> <span class="s2">&quot;03_key_entered&quot;</span><span class="p">,</span> <span class="s2">&quot;Encryption key entered&quot;</span><span class="p">)</span>

        <span class="n">decrypt_btn</span> <span class="o">=</span> <span class="n">page</span><span class="o">.</span><span class="n">locator</span><span class="p">(</span>
            <span class="s2">&quot;button:has-text(&#39;Decrypt&#39;), button:has-text(&#39;Download&#39;), &quot;</span>
            <span class="s2">&quot;button:has-text(&#39;Unlock&#39;)&quot;</span>
        <span class="p">)</span><span class="o">.</span><span class="n">first</span>
        <span class="k">assert</span> <span class="n">decrypt_btn</span><span class="o">.</span><span class="n">is_visible</span><span class="p">(</span><span class="n">timeout</span><span class="o">=</span><span class="mi">3000</span><span class="p">),</span> <span class="s2">&quot;Decrypt button not found&quot;</span>
        <span class="n">decrypt_btn</span><span class="o">.</span><span class="n">click</span><span class="p">()</span>

        <span class="n">page</span><span class="o">.</span><span class="n">wait_for_timeout</span><span class="p">(</span><span class="mi">5000</span><span class="p">)</span>
        <span class="n">screenshots</span><span class="o">.</span><span class="n">capture</span><span class="p">(</span><span class="n">page</span><span class="p">,</span> <span class="s2">&quot;04_decrypted&quot;</span><span class="p">,</span> <span class="s2">&quot;Content decrypted with separate key&quot;</span><span class="p">)</span>

        <span class="c1"># Verify decrypted content</span>
        <span class="n">body_text</span> <span class="o">=</span> <span class="n">page</span><span class="o">.</span><span class="n">text_content</span><span class="p">(</span><span class="s2">&quot;body&quot;</span><span class="p">)</span> <span class="ow">or</span> <span class="s2">&quot;&quot;</span>
        <span class="k">assert</span> <span class="n">SAMPLE_CONTENT</span> <span class="ow">in</span> <span class="n">body_text</span><span class="p">,</span> <span class="p">(</span>
            <span class="sa">f</span><span class="s2">&quot;Content not found after decryption. Transfer ID: </span><span class="si">{</span><span class="n">tid</span><span class="si">}</span><span class="s2">&quot;</span>
        <span class="p">)</span>

    <span class="k">def</span><span class="w"> </span><span class="nf">test_wrong_key_shows_error</span><span class="p">(</span><span class="bp">self</span><span class="p">,</span> <span class="n">page</span><span class="p">,</span> <span class="n">ui_url</span><span class="p">,</span> <span class="n">transfer_helper</span><span class="p">,</span> <span class="n">screenshots</span><span class="p">):</span>
<span class="w">        </span><span class="sd">&quot;&quot;&quot;Enter an incorrect key and verify an error message appears.&quot;&quot;&quot;</span>
        <span class="n">tid</span><span class="p">,</span> <span class="n">_correct_key</span> <span class="o">=</span> <span class="n">transfer_helper</span><span class="o">.</span><span class="n">upload_encrypted</span><span class="p">(</span>
            <span class="n">plaintext</span><span class="o">=</span><span class="sa">b</span><span class="s2">&quot;wrong key test content&quot;</span><span class="p">,</span>
            <span class="n">filename</span><span class="o">=</span><span class="s2">&quot;wrong-key-test.txt&quot;</span><span class="p">,</span>
        <span class="p">)</span>

        <span class="c1"># Generate a wrong key (random 32 bytes, base64url encoded)</span>
        <span class="n">wrong_key</span> <span class="o">=</span> <span class="n">base64</span><span class="o">.</span><span class="n">urlsafe_b64encode</span><span class="p">(</span><span class="n">os</span><span class="o">.</span><span class="n">urandom</span><span class="p">(</span><span class="mi">32</span><span class="p">))</span><span class="o">.</span><span class="n">rstrip</span><span class="p">(</span><span class="sa">b</span><span class="s2">&quot;=&quot;</span><span class="p">)</span><span class="o">.</span><span class="n">decode</span><span class="p">()</span>

        <span class="n">page</span><span class="o">.</span><span class="n">goto</span><span class="p">(</span><span class="sa">f</span><span class="s2">&quot;</span><span class="si">{</span><span class="n">ui_url</span><span class="si">}</span><span class="s2">/en-gb/download/#</span><span class="si">{</span><span class="n">tid</span><span class="si">}</span><span class="s2">&quot;</span><span class="p">)</span>
        <span class="n">page</span><span class="o">.</span><span class="n">wait_for_load_state</span><span class="p">(</span><span class="s2">&quot;networkidle&quot;</span><span class="p">)</span>
        <span class="n">page</span><span class="o">.</span><span class="n">wait_for_timeout</span><span class="p">(</span><span class="mi">3000</span><span class="p">)</span>

        <span class="c1"># Enter wrong key</span>
        <span class="n">key_input</span> <span class="o">=</span> <span class="n">page</span><span class="o">.</span><span class="n">locator</span><span class="p">(</span>
            <span class="s2">&quot;input[type=&#39;password&#39;], input[type=&#39;text&#39;][placeholder*=&#39;key&#39;], &quot;</span>
            <span class="s2">&quot;input[placeholder*=&#39;Key&#39;], input[placeholder*=&#39;decrypt&#39;]&quot;</span>
        <span class="p">)</span><span class="o">.</span><span class="n">first</span>
        <span class="k">assert</span> <span class="n">key_input</span><span class="o">.</span><span class="n">is_visible</span><span class="p">(</span><span class="n">timeout</span><span class="o">=</span><span class="mi">5000</span><span class="p">),</span> <span class="s2">&quot;Key input not visible&quot;</span>
        <span class="n">key_input</span><span class="o">.</span><span class="n">fill</span><span class="p">(</span><span class="n">wrong_key</span><span class="p">)</span>

        <span class="n">decrypt_btn</span> <span class="o">=</span> <span class="n">page</span><span class="o">.</span><span class="n">locator</span><span class="p">(</span>
            <span class="s2">&quot;button:has-text(&#39;Decrypt&#39;), button:has-text(&#39;Download&#39;), &quot;</span>
            <span class="s2">&quot;button:has-text(&#39;Unlock&#39;)&quot;</span>
        <span class="p">)</span><span class="o">.</span><span class="n">first</span>
        <span class="n">decrypt_btn</span><span class="o">.</span><span class="n">click</span><span class="p">()</span>

        <span class="n">page</span><span class="o">.</span><span class="n">wait_for_timeout</span><span class="p">(</span><span class="mi">3000</span><span class="p">)</span>
        <span class="n">screenshots</span><span class="o">.</span><span class="n">capture</span><span class="p">(</span><span class="n">page</span><span class="p">,</span> <span class="s2">&quot;05_wrong_key_error&quot;</span><span class="p">,</span> <span class="s2">&quot;Error message after wrong key&quot;</span><span class="p">)</span>

        <span class="c1"># Verify error message (AES-GCM authentication failure)</span>
        <span class="n">body_text</span> <span class="o">=</span> <span class="p">(</span><span class="n">page</span><span class="o">.</span><span class="n">text_content</span><span class="p">(</span><span class="s2">&quot;body&quot;</span><span class="p">)</span> <span class="ow">or</span> <span class="s2">&quot;&quot;</span><span class="p">)</span><span class="o">.</span><span class="n">lower</span><span class="p">()</span>
        <span class="n">error_indicators</span> <span class="o">=</span> <span class="p">[</span><span class="s2">&quot;error&quot;</span><span class="p">,</span> <span class="s2">&quot;failed&quot;</span><span class="p">,</span> <span class="s2">&quot;invalid&quot;</span><span class="p">,</span> <span class="s2">&quot;incorrect&quot;</span><span class="p">,</span> <span class="s2">&quot;wrong&quot;</span><span class="p">,</span> <span class="s2">&quot;unable&quot;</span><span class="p">]</span>
        <span class="n">has_error</span> <span class="o">=</span> <span class="nb">any</span><span class="p">(</span><span class="n">indicator</span> <span class="ow">in</span> <span class="n">body_text</span> <span class="k">for</span> <span class="n">indicator</span> <span class="ow">in</span> <span class="n">error_indicators</span><span class="p">)</span>
        <span class="k">assert</span> <span class="n">has_error</span><span class="p">,</span> <span class="p">(</span>
            <span class="sa">f</span><span class="s2">&quot;No error message shown for wrong key. &quot;</span>
            <span class="sa">f</span><span class="s2">&quot;AES-GCM should reject authentication. Body: </span><span class="si">{</span><span class="n">body_text</span><span class="p">[:</span><span class="mi">300</span><span class="p">]</span><span class="si">}</span><span class="s2">&quot;</span>
        <span class="p">)</span>

    <span class="k">def</span><span class="w"> </span><span class="nf">test_separate_key_ui_flow</span><span class="p">(</span><span class="bp">self</span><span class="p">,</span> <span class="n">page</span><span class="p">,</span> <span class="n">ui_url</span><span class="p">,</span> <span class="n">send_server</span><span class="p">,</span> <span class="n">screenshots</span><span class="p">):</span>
<span class="w">        </span><span class="sd">&quot;&quot;&quot;Full UI flow: upload with Separate Key mode, extract link + key, verify.&quot;&quot;&quot;</span>
        <span class="n">page</span><span class="o">.</span><span class="n">goto</span><span class="p">(</span><span class="sa">f</span><span class="s2">&quot;</span><span class="si">{</span><span class="n">ui_url</span><span class="si">}</span><span class="s2">/en-gb/&quot;</span><span class="p">)</span>
        <span class="n">page</span><span class="o">.</span><span class="n">wait_for_load_state</span><span class="p">(</span><span class="s2">&quot;networkidle&quot;</span><span class="p">)</span>

        <span class="c1"># Handle access gate</span>
        <span class="n">access_input</span> <span class="o">=</span> <span class="n">page</span><span class="o">.</span><span class="n">locator</span><span class="p">(</span><span class="s2">&quot;input[type=&#39;text&#39;], input[type=&#39;password&#39;]&quot;</span><span class="p">)</span><span class="o">.</span><span class="n">first</span>
        <span class="k">if</span> <span class="n">access_input</span><span class="o">.</span><span class="n">is_visible</span><span class="p">(</span><span class="n">timeout</span><span class="o">=</span><span class="mi">2000</span><span class="p">):</span>
            <span class="n">access_input</span><span class="o">.</span><span class="n">fill</span><span class="p">(</span><span class="n">send_server</span><span class="o">.</span><span class="n">access_token</span><span class="p">)</span>
            <span class="n">page</span><span class="o">.</span><span class="n">locator</span><span class="p">(</span><span class="s2">&quot;button&quot;</span><span class="p">)</span><span class="o">.</span><span class="n">first</span><span class="o">.</span><span class="n">click</span><span class="p">()</span>
            <span class="n">page</span><span class="o">.</span><span class="n">wait_for_load_state</span><span class="p">(</span><span class="s2">&quot;networkidle&quot;</span><span class="p">)</span>

        <span class="c1"># Upload file</span>
        <span class="n">file_input</span> <span class="o">=</span> <span class="n">page</span><span class="o">.</span><span class="n">locator</span><span class="p">(</span><span class="s2">&quot;#file-input&quot;</span><span class="p">)</span>
        <span class="n">file_input</span><span class="o">.</span><span class="n">set_input_files</span><span class="p">({</span>
            <span class="s2">&quot;name&quot;</span>    <span class="p">:</span> <span class="s2">&quot;separate-key-ui.txt&quot;</span><span class="p">,</span>
            <span class="s2">&quot;mimeType&quot;</span><span class="p">:</span> <span class="s2">&quot;text/plain&quot;</span><span class="p">,</span>
            <span class="s2">&quot;buffer&quot;</span>  <span class="p">:</span> <span class="n">SAMPLE_CONTENT</span><span class="o">.</span><span class="n">encode</span><span class="p">(),</span>
        <span class="p">})</span>
        <span class="n">page</span><span class="o">.</span><span class="n">wait_for_timeout</span><span class="p">(</span><span class="mi">1000</span><span class="p">)</span>

        <span class="c1"># Navigate to share mode step</span>
        <span class="k">for</span> <span class="n">_</span> <span class="ow">in</span> <span class="nb">range</span><span class="p">(</span><span class="mi">3</span><span class="p">):</span>
            <span class="n">btn</span> <span class="o">=</span> <span class="n">page</span><span class="o">.</span><span class="n">locator</span><span class="p">(</span><span class="s2">&quot;button:has-text(&#39;Next&#39;), button:has-text(&#39;Continue&#39;)&quot;</span><span class="p">)</span><span class="o">.</span><span class="n">first</span>
            <span class="k">if</span> <span class="n">btn</span><span class="o">.</span><span class="n">is_visible</span><span class="p">(</span><span class="n">timeout</span><span class="o">=</span><span class="mi">2000</span><span class="p">):</span>
                <span class="n">btn</span><span class="o">.</span><span class="n">click</span><span class="p">()</span>
                <span class="n">page</span><span class="o">.</span><span class="n">wait_for_timeout</span><span class="p">(</span><span class="mi">500</span><span class="p">)</span>

        <span class="c1"># Select Separate Key</span>
        <span class="n">sep_key</span> <span class="o">=</span> <span class="n">page</span><span class="o">.</span><span class="n">locator</span><span class="p">(</span><span class="s2">&quot;text=Separate key, text=Separate Key&quot;</span><span class="p">)</span><span class="o">.</span><span class="n">first</span>
        <span class="k">if</span> <span class="n">sep_key</span><span class="o">.</span><span class="n">is_visible</span><span class="p">(</span><span class="n">timeout</span><span class="o">=</span><span class="mi">3000</span><span class="p">):</span>
            <span class="n">sep_key</span><span class="o">.</span><span class="n">click</span><span class="p">()</span>
            <span class="n">page</span><span class="o">.</span><span class="n">wait_for_timeout</span><span class="p">(</span><span class="mi">500</span><span class="p">)</span>
        <span class="n">screenshots</span><span class="o">.</span><span class="n">capture</span><span class="p">(</span><span class="n">page</span><span class="p">,</span> <span class="s2">&quot;06_separate_key_selected&quot;</span><span class="p">,</span> <span class="s2">&quot;Separate Key mode selected&quot;</span><span class="p">)</span>

        <span class="c1"># Complete wizard</span>
        <span class="k">for</span> <span class="n">_</span> <span class="ow">in</span> <span class="nb">range</span><span class="p">(</span><span class="mi">5</span><span class="p">):</span>
            <span class="n">btn</span> <span class="o">=</span> <span class="n">page</span><span class="o">.</span><span class="n">locator</span><span class="p">(</span>
                <span class="s2">&quot;button:has-text(&#39;Next&#39;), button:has-text(&#39;Continue&#39;), &quot;</span>
                <span class="s2">&quot;button:has-text(&#39;Upload&#39;), button:has-text(&#39;Encrypt&#39;), &quot;</span>
                <span class="s2">&quot;button:has-text(&#39;Confirm&#39;)&quot;</span>
            <span class="p">)</span><span class="o">.</span><span class="n">first</span>
            <span class="k">if</span> <span class="n">btn</span><span class="o">.</span><span class="n">is_visible</span><span class="p">(</span><span class="n">timeout</span><span class="o">=</span><span class="mi">2000</span><span class="p">):</span>
                <span class="n">btn</span><span class="o">.</span><span class="n">click</span><span class="p">()</span>
                <span class="n">page</span><span class="o">.</span><span class="n">wait_for_timeout</span><span class="p">(</span><span class="mi">1000</span><span class="p">)</span>

        <span class="n">page</span><span class="o">.</span><span class="n">wait_for_timeout</span><span class="p">(</span><span class="mi">3000</span><span class="p">)</span>
        <span class="n">screenshots</span><span class="o">.</span><span class="n">capture</span><span class="p">(</span><span class="n">page</span><span class="p">,</span> <span class="s2">&quot;07_separate_key_done&quot;</span><span class="p">,</span> <span class="s2">&quot;Upload complete — link and key shown separately&quot;</span><span class="p">)</span>

        <span class="c1"># The page should show a link AND a separate key</span>
        <span class="n">body_text</span> <span class="o">=</span> <span class="n">page</span><span class="o">.</span><span class="n">text_content</span><span class="p">(</span><span class="s2">&quot;body&quot;</span><span class="p">)</span> <span class="ow">or</span> <span class="s2">&quot;&quot;</span>

        <span class="c1"># Verify there&#39;s a download link (without key in hash)</span>
        <span class="n">link_el</span> <span class="o">=</span> <span class="n">page</span><span class="o">.</span><span class="n">locator</span><span class="p">(</span><span class="s2">&quot;a[href*=&#39;download&#39;], a[href*=&#39;/en-gb/&#39;]&quot;</span><span class="p">)</span><span class="o">.</span><span class="n">first</span>
        <span class="n">link_url</span> <span class="o">=</span> <span class="s2">&quot;&quot;</span>
        <span class="k">if</span> <span class="n">link_el</span><span class="o">.</span><span class="n">is_visible</span><span class="p">(</span><span class="n">timeout</span><span class="o">=</span><span class="mi">3000</span><span class="p">):</span>
            <span class="n">link_url</span> <span class="o">=</span> <span class="n">link_el</span><span class="o">.</span><span class="n">get_attribute</span><span class="p">(</span><span class="s2">&quot;href&quot;</span><span class="p">)</span> <span class="ow">or</span> <span class="s2">&quot;&quot;</span>

        <span class="k">if</span> <span class="ow">not</span> <span class="n">link_url</span><span class="p">:</span>
            <span class="k">for</span> <span class="n">input_el</span> <span class="ow">in</span> <span class="n">page</span><span class="o">.</span><span class="n">locator</span><span class="p">(</span><span class="s2">&quot;input[readonly]&quot;</span><span class="p">)</span><span class="o">.</span><span class="n">all</span><span class="p">():</span>
                <span class="n">val</span> <span class="o">=</span> <span class="n">input_el</span><span class="o">.</span><span class="n">get_attribute</span><span class="p">(</span><span class="s2">&quot;value&quot;</span><span class="p">)</span> <span class="ow">or</span> <span class="s2">&quot;&quot;</span>
                <span class="k">if</span> <span class="s2">&quot;download&quot;</span> <span class="ow">in</span> <span class="n">val</span> <span class="ow">or</span> <span class="s2">&quot;/en-gb/&quot;</span> <span class="ow">in</span> <span class="n">val</span><span class="p">:</span>
                    <span class="n">link_url</span> <span class="o">=</span> <span class="n">val</span>
                    <span class="k">break</span>

        <span class="c1"># The separate key link should NOT contain the key in the hash</span>
        <span class="c1"># (unlike combined link which has #id/key)</span>
        <span class="k">if</span> <span class="n">link_url</span> <span class="ow">and</span> <span class="s2">&quot;#&quot;</span> <span class="ow">in</span> <span class="n">link_url</span><span class="p">:</span>
            <span class="n">hash_part</span> <span class="o">=</span> <span class="n">link_url</span><span class="o">.</span><span class="n">split</span><span class="p">(</span><span class="s2">&quot;#&quot;</span><span class="p">,</span> <span class="mi">1</span><span class="p">)[</span><span class="mi">1</span><span class="p">]</span>
            <span class="k">assert</span> <span class="s2">&quot;/&quot;</span> <span class="ow">not</span> <span class="ow">in</span> <span class="n">hash_part</span><span class="p">,</span> <span class="p">(</span>
                <span class="sa">f</span><span class="s2">&quot;Separate key link should NOT have key in hash: </span><span class="si">{</span><span class="n">link_url</span><span class="si">}</span><span class="s2">&quot;</span>
            <span class="p">)</span>

            </script>
