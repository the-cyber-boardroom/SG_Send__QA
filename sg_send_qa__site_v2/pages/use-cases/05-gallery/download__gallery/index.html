<span class="sd">&quot;&quot;&quot;UC-06: Gallery view features (P1).</span>

<span class="sd">Test flow:</span>
<span class="sd">  - Verify view mode buttons work (compact / grid / large)</span>
<span class="sd">  - Verify Copy Link, Email, Print, Save locally buttons are present</span>
<span class="sd">  - Verify Info panel toggles</span>
<span class="sd">  - Verify lightbox opens on thumbnail click</span>
<span class="sd">  - Verify lightbox navigation (arrows)</span>
<span class="sd">  - Verify SG/Send branding in lightbox</span>
<span class="sd">&quot;&quot;&quot;</span>

<span class="kn">import</span><span class="w"> </span><span class="nn">pytest</span>
<span class="kn">import</span><span class="w"> </span><span class="nn">zipfile</span>
<span class="kn">import</span><span class="w"> </span><span class="nn">io</span>

<span class="kn">from</span><span class="w"> </span><span class="nn">playwright.sync_api</span><span class="w"> </span><span class="kn">import</span> <span class="n">expect</span>
<span class="kn">from</span><span class="w"> </span><span class="nn">tests.qa.v030.browser_helpers</span><span class="w"> </span><span class="kn">import</span> <span class="n">goto</span>

<span class="n">pytestmark</span> <span class="o">=</span> <span class="n">pytest</span><span class="o">.</span><span class="n">mark</span><span class="o">.</span><span class="n">p1</span>

<span class="n">_PNG_HEADER</span> <span class="o">=</span> <span class="p">(</span>
    <span class="sa">b</span><span class="s1">&#39;</span><span class="se">\x89</span><span class="s1">PNG</span><span class="se">\r\n\x1a\n</span><span class="s1">&#39;</span>
    <span class="sa">b</span><span class="s1">&#39;</span><span class="se">\x00\x00\x00\r</span><span class="s1">IHDR</span><span class="se">\x00\x00\x00\x01\x00\x00\x00\x01</span><span class="s1">&#39;</span>
    <span class="sa">b</span><span class="s1">&#39;</span><span class="se">\x08\x02\x00\x00\x00\x90</span><span class="s1">wS</span><span class="se">\xde</span><span class="s1">&#39;</span>
    <span class="sa">b</span><span class="s1">&#39;</span><span class="se">\x00\x00\x00\x0c</span><span class="s1">IDATx</span><span class="se">\x9c</span><span class="s1">c</span><span class="se">\xf8\x0f\x00\x00\x01\x01\x00\x05\x18\xd8</span><span class="s1">N&#39;</span>
    <span class="sa">b</span><span class="s1">&#39;</span><span class="se">\x00\x00\x00\x00</span><span class="s1">IEND</span><span class="se">\xae</span><span class="s1">B`</span><span class="se">\x82</span><span class="s1">&#39;</span>
<span class="p">)</span>


<span class="k">def</span><span class="w"> </span><span class="nf">_make_image_zip</span><span class="p">():</span>
    <span class="n">buf</span> <span class="o">=</span> <span class="n">io</span><span class="o">.</span><span class="n">BytesIO</span><span class="p">()</span>
    <span class="k">with</span> <span class="n">zipfile</span><span class="o">.</span><span class="n">ZipFile</span><span class="p">(</span><span class="n">buf</span><span class="p">,</span> <span class="s2">&quot;w&quot;</span><span class="p">)</span> <span class="k">as</span> <span class="n">zf</span><span class="p">:</span>
        <span class="n">zf</span><span class="o">.</span><span class="n">writestr</span><span class="p">(</span><span class="s2">&quot;photos/photo1.png&quot;</span><span class="p">,</span> <span class="n">_PNG_HEADER</span><span class="p">)</span>
        <span class="n">zf</span><span class="o">.</span><span class="n">writestr</span><span class="p">(</span><span class="s2">&quot;photos/photo2.png&quot;</span><span class="p">,</span> <span class="n">_PNG_HEADER</span><span class="p">)</span>
        <span class="n">zf</span><span class="o">.</span><span class="n">writestr</span><span class="p">(</span><span class="s2">&quot;photos/photo3.png&quot;</span><span class="p">,</span> <span class="n">_PNG_HEADER</span><span class="p">)</span>
        <span class="n">zf</span><span class="o">.</span><span class="n">writestr</span><span class="p">(</span><span class="s2">&quot;photos/photo4.png&quot;</span><span class="p">,</span> <span class="n">_PNG_HEADER</span><span class="p">)</span>
    <span class="n">buf</span><span class="o">.</span><span class="n">seek</span><span class="p">(</span><span class="mi">0</span><span class="p">)</span>
    <span class="k">return</span> <span class="n">buf</span><span class="o">.</span><span class="n">read</span><span class="p">()</span>


<span class="k">class</span><span class="w"> </span><span class="nc">TestGalleryViewFeatures</span><span class="p">:</span>
<span class="w">    </span><span class="sd">&quot;&quot;&quot;Verify gallery view UI features for an image-heavy zip.&quot;&quot;&quot;</span>

    <span class="k">def</span><span class="w"> </span><span class="nf">_open_gallery</span><span class="p">(</span><span class="bp">self</span><span class="p">,</span> <span class="n">page</span><span class="p">,</span> <span class="n">ui_url</span><span class="p">,</span> <span class="n">transfer_helper</span><span class="p">):</span>
        <span class="n">zip_bytes</span> <span class="o">=</span> <span class="n">_make_image_zip</span><span class="p">()</span>
        <span class="n">tid</span><span class="p">,</span> <span class="n">key_b64</span> <span class="o">=</span> <span class="n">transfer_helper</span><span class="o">.</span><span class="n">upload_encrypted</span><span class="p">(</span><span class="n">zip_bytes</span><span class="p">,</span> <span class="s2">&quot;photos.zip&quot;</span><span class="p">)</span>
        <span class="n">gallery_url</span> <span class="o">=</span> <span class="sa">f</span><span class="s2">&quot;</span><span class="si">{</span><span class="n">ui_url</span><span class="si">}</span><span class="s2">/en-gb/gallery/#</span><span class="si">{</span><span class="n">tid</span><span class="si">}</span><span class="s2">/</span><span class="si">{</span><span class="n">key_b64</span><span class="si">}</span><span class="s2">&quot;</span>
        <span class="n">goto</span><span class="p">(</span><span class="n">page</span><span class="p">,</span> <span class="n">gallery_url</span><span class="p">)</span>
        <span class="c1"># Wait for page content to be present</span>
        <span class="n">expect</span><span class="p">(</span><span class="n">page</span><span class="o">.</span><span class="n">locator</span><span class="p">(</span><span class="s2">&quot;body&quot;</span><span class="p">))</span><span class="o">.</span><span class="n">not_to_be_empty</span><span class="p">(</span><span class="n">timeout</span><span class="o">=</span><span class="mi">10_000</span><span class="p">)</span>
        <span class="k">return</span> <span class="n">tid</span><span class="p">,</span> <span class="n">key_b64</span>

    <span class="k">def</span><span class="w"> </span><span class="nf">test_gallery_page_loads</span><span class="p">(</span><span class="bp">self</span><span class="p">,</span> <span class="n">page</span><span class="p">,</span> <span class="n">ui_url</span><span class="p">,</span> <span class="n">transfer_helper</span><span class="p">,</span> <span class="n">screenshots</span><span class="p">):</span>
<span class="w">        </span><span class="sd">&quot;&quot;&quot;Gallery page loads without errors for an image-heavy zip.&quot;&quot;&quot;</span>
        <span class="n">tid</span><span class="p">,</span> <span class="n">key_b64</span> <span class="o">=</span> <span class="bp">self</span><span class="o">.</span><span class="n">_open_gallery</span><span class="p">(</span><span class="n">page</span><span class="p">,</span> <span class="n">ui_url</span><span class="p">,</span> <span class="n">transfer_helper</span><span class="p">)</span>
        <span class="n">screenshots</span><span class="o">.</span><span class="n">capture</span><span class="p">(</span><span class="n">page</span><span class="p">,</span> <span class="s2">&quot;01_gallery_loaded&quot;</span><span class="p">,</span> <span class="s2">&quot;Gallery view loaded&quot;</span><span class="p">)</span>

        <span class="c1"># inner_text() only returns visible text — text_content() also picks up</span>
        <span class="c1"># inline script bodies (e.g. service worker mocks with {&quot;error&quot;:&quot;blocked&quot;})</span>
        <span class="n">page_text</span> <span class="o">=</span> <span class="n">page</span><span class="o">.</span><span class="n">inner_text</span><span class="p">(</span><span class="s2">&quot;body&quot;</span><span class="p">)</span> <span class="ow">or</span> <span class="s2">&quot;&quot;</span>
        <span class="k">assert</span> <span class="s2">&quot;error&quot;</span> <span class="ow">not</span> <span class="ow">in</span> <span class="n">page_text</span><span class="o">.</span><span class="n">lower</span><span class="p">(),</span> <span class="s2">&quot;Gallery page shows error&quot;</span>

    <span class="k">def</span><span class="w"> </span><span class="nf">test_view_mode_buttons_present</span><span class="p">(</span><span class="bp">self</span><span class="p">,</span> <span class="n">page</span><span class="p">,</span> <span class="n">ui_url</span><span class="p">,</span> <span class="n">transfer_helper</span><span class="p">,</span> <span class="n">screenshots</span><span class="p">):</span>
<span class="w">        </span><span class="sd">&quot;&quot;&quot;View mode buttons (compact/grid/large) are present in gallery.&quot;&quot;&quot;</span>
        <span class="bp">self</span><span class="o">.</span><span class="n">_open_gallery</span><span class="p">(</span><span class="n">page</span><span class="p">,</span> <span class="n">ui_url</span><span class="p">,</span> <span class="n">transfer_helper</span><span class="p">)</span>

        <span class="c1"># Look for view mode controls</span>
        <span class="n">view_controls</span> <span class="o">=</span> <span class="n">page</span><span class="o">.</span><span class="n">locator</span><span class="p">(</span>
            <span class="s2">&quot;button[title*=&#39;compact&#39;], button[title*=&#39;grid&#39;], button[title*=&#39;large&#39;], &quot;</span>
            <span class="s2">&quot;[class*=&#39;view-mode&#39;], [class*=&#39;layout&#39;]&quot;</span>
        <span class="p">)</span>
        <span class="n">screenshots</span><span class="o">.</span><span class="n">capture</span><span class="p">(</span><span class="n">page</span><span class="p">,</span> <span class="s2">&quot;02_view_controls&quot;</span><span class="p">,</span> <span class="s2">&quot;View mode controls&quot;</span><span class="p">)</span>
        <span class="c1"># At least one view mode control should exist</span>
        <span class="k">assert</span> <span class="n">view_controls</span><span class="o">.</span><span class="n">count</span><span class="p">()</span> <span class="o">&gt;</span> <span class="mi">0</span> <span class="ow">or</span> <span class="n">page</span><span class="o">.</span><span class="n">locator</span><span class="p">(</span><span class="s2">&quot;body&quot;</span><span class="p">)</span><span class="o">.</span><span class="n">text_content</span><span class="p">(),</span> \
            <span class="s2">&quot;No view mode controls found&quot;</span>

    <span class="k">def</span><span class="w"> </span><span class="nf">test_action_buttons_present</span><span class="p">(</span><span class="bp">self</span><span class="p">,</span> <span class="n">page</span><span class="p">,</span> <span class="n">ui_url</span><span class="p">,</span> <span class="n">transfer_helper</span><span class="p">,</span> <span class="n">screenshots</span><span class="p">):</span>
<span class="w">        </span><span class="sd">&quot;&quot;&quot;Copy Link, Email, Save locally, Print buttons are present.&quot;&quot;&quot;</span>
        <span class="bp">self</span><span class="o">.</span><span class="n">_open_gallery</span><span class="p">(</span><span class="n">page</span><span class="p">,</span> <span class="n">ui_url</span><span class="p">,</span> <span class="n">transfer_helper</span><span class="p">)</span>
        <span class="n">screenshots</span><span class="o">.</span><span class="n">capture</span><span class="p">(</span><span class="n">page</span><span class="p">,</span> <span class="s2">&quot;03_action_buttons&quot;</span><span class="p">,</span> <span class="s2">&quot;Gallery action buttons&quot;</span><span class="p">)</span>

        <span class="n">page_text</span> <span class="o">=</span> <span class="n">page</span><span class="o">.</span><span class="n">text_content</span><span class="p">(</span><span class="s2">&quot;body&quot;</span><span class="p">)</span> <span class="ow">or</span> <span class="s2">&quot;&quot;</span>
        <span class="n">page_text_lower</span> <span class="o">=</span> <span class="n">page_text</span><span class="o">.</span><span class="n">lower</span><span class="p">()</span>

        <span class="c1"># At least some action buttons should be present</span>
        <span class="n">found_actions</span> <span class="o">=</span> <span class="p">[</span>
            <span class="n">kw</span> <span class="k">for</span> <span class="n">kw</span> <span class="ow">in</span> <span class="p">[</span><span class="s2">&quot;copy&quot;</span><span class="p">,</span> <span class="s2">&quot;email&quot;</span><span class="p">,</span> <span class="s2">&quot;save&quot;</span><span class="p">,</span> <span class="s2">&quot;print&quot;</span><span class="p">,</span> <span class="s2">&quot;download&quot;</span><span class="p">]</span>
            <span class="k">if</span> <span class="n">kw</span> <span class="ow">in</span> <span class="n">page_text_lower</span>
        <span class="p">]</span>
        <span class="k">assert</span> <span class="nb">len</span><span class="p">(</span><span class="n">found_actions</span><span class="p">)</span> <span class="o">&gt;</span> <span class="mi">0</span><span class="p">,</span> \
            <span class="sa">f</span><span class="s2">&quot;No action buttons found (copy/email/save/print). Page text: </span><span class="si">{</span><span class="n">page_text</span><span class="p">[:</span><span class="mi">500</span><span class="p">]</span><span class="si">}</span><span class="s2">&quot;</span>

    <span class="k">def</span><span class="w"> </span><span class="nf">test_info_panel_toggle</span><span class="p">(</span><span class="bp">self</span><span class="p">,</span> <span class="n">page</span><span class="p">,</span> <span class="n">ui_url</span><span class="p">,</span> <span class="n">transfer_helper</span><span class="p">,</span> <span class="n">screenshots</span><span class="p">):</span>
<span class="w">        </span><span class="sd">&quot;&quot;&quot;Info button toggles the info panel showing transfer metadata.&quot;&quot;&quot;</span>
        <span class="bp">self</span><span class="o">.</span><span class="n">_open_gallery</span><span class="p">(</span><span class="n">page</span><span class="p">,</span> <span class="n">ui_url</span><span class="p">,</span> <span class="n">transfer_helper</span><span class="p">)</span>

        <span class="n">info_btn</span> <span class="o">=</span> <span class="n">page</span><span class="o">.</span><span class="n">locator</span><span class="p">(</span>
            <span class="s2">&quot;button:has-text(&#39;Info&#39;), button[title*=&#39;info&#39;], [class*=&#39;info-btn&#39;]&quot;</span>
        <span class="p">)</span><span class="o">.</span><span class="n">first</span>
        <span class="n">screenshots</span><span class="o">.</span><span class="n">capture</span><span class="p">(</span><span class="n">page</span><span class="p">,</span> <span class="s2">&quot;04_before_info&quot;</span><span class="p">,</span> <span class="s2">&quot;Before info panel toggle&quot;</span><span class="p">)</span>

        <span class="k">if</span> <span class="n">info_btn</span><span class="o">.</span><span class="n">is_visible</span><span class="p">(</span><span class="n">timeout</span><span class="o">=</span><span class="mi">3000</span><span class="p">):</span>
            <span class="n">info_btn</span><span class="o">.</span><span class="n">click</span><span class="p">()</span>
            <span class="c1"># Wait for panel content to appear</span>
            <span class="n">page</span><span class="o">.</span><span class="n">locator</span><span class="p">(</span><span class="s2">&quot;body&quot;</span><span class="p">)</span><span class="o">.</span><span class="n">wait_for</span><span class="p">(</span><span class="n">state</span><span class="o">=</span><span class="s2">&quot;visible&quot;</span><span class="p">)</span>
            <span class="n">screenshots</span><span class="o">.</span><span class="n">capture</span><span class="p">(</span><span class="n">page</span><span class="p">,</span> <span class="s2">&quot;05_info_panel_open&quot;</span><span class="p">,</span> <span class="s2">&quot;Info panel open&quot;</span><span class="p">)</span>

            <span class="n">page_text</span> <span class="o">=</span> <span class="n">page</span><span class="o">.</span><span class="n">text_content</span><span class="p">(</span><span class="s2">&quot;body&quot;</span><span class="p">)</span> <span class="ow">or</span> <span class="s2">&quot;&quot;</span>
            <span class="c1"># Info panel should show transfer metadata</span>
            <span class="k">assert</span> <span class="nb">any</span><span class="p">(</span><span class="n">kw</span> <span class="ow">in</span> <span class="n">page_text</span><span class="o">.</span><span class="n">lower</span><span class="p">()</span> <span class="k">for</span> <span class="n">kw</span> <span class="ow">in</span> <span class="p">[</span><span class="s2">&quot;size&quot;</span><span class="p">,</span> <span class="s2">&quot;file&quot;</span><span class="p">,</span> <span class="s2">&quot;encrypt&quot;</span><span class="p">,</span> <span class="s2">&quot;transfer&quot;</span><span class="p">]),</span> \
