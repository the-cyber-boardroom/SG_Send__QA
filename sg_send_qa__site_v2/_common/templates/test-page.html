<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{title} — SG/Send QA</title>
    <meta name="description" content="QA documentation for {use_case} — automated Playwright browser test results.">

    <link rel="icon" type="image/svg+xml" href="{common_prefix}favicon.svg">
    <link rel="stylesheet" href="{common_prefix}fonts/fonts.css">
    <link rel="stylesheet" href="{common_prefix}css/design-tokens.css">
    <link rel="stylesheet" href="{common_prefix}css/shared-components.css">
    <link rel="stylesheet" href="{common_prefix}css/qa-site.css">
    <link rel="stylesheet" href="{common_prefix}css/qa-code.css">
</head>
<body>

    <sg-site-header
        site="QA"
        home-url="https://qa.send.sgraph.ai"
        nav-items='[
            {{"label":"Dashboard","href":"/pages/dashboard/"}},
            {{"label":"Pipeline",  "href":"/pages/pipeline/"}},
            {{"label":"Roadmap",   "href":"/pages/roadmap/"}},
            {{"label":"Known Bugs","href":"/pages/known-bugs/"}},
            {{"label":"SG/Send",   "href":"https://send.sgraph.ai","external":true}},
            {{"label":"GitHub",    "href":"https://github.com/the-cyber-boardroom/SG_Send__qa","external":true}}
        ]'>
    </sg-site-header>

    <div class="qa-content-wrapper">

        <div class="qa-sidebar-slot">
            <qa-sidebar data-current="{permalink}"></qa-sidebar>
        </div>

        <main class="qa-main">

            <qa-test-page
                data-use-case="{use_case}"
                data-group="{group}"
                data-commit="{commit_sha}"
                data-version="{version}"
                data-github-url="https://github.com/the-cyber-boardroom/SG_Send__qa/blob/{commit_sha}/{test_path}"
                data-live-site-url="https://qa.send.sgraph.ai">
            </qa-test-page>

            <!-- Metadata embedded at generation time — no extra HTTP request needed -->
            <script type="application/json" id="qa-metadata">
{metadata_json}
            </script>

            <!-- Test source — syntax highlighted by Pygments at generation time -->
            <script type="text/qa-source">
{source_highlighted}
            </script>

        </main>
    </div>

    <sg-site-footer
        brand-desc="Automated QA for SG/Send"
        copyright="SGraph AI">
    </sg-site-footer>

    <script src="{common_prefix}js/build-info.js"></script>

    <script type="module" src="https://dev.tools.sgraph.ai/components/site-header/v1/v1.0/v1.0.2/sg-site-header.js"></script>
    <script type="module" src="https://dev.tools.sgraph.ai/components/site-footer/v1/v1.0/v1.0.0/sg-site-footer.js"></script>
    <script type="module" src="{common_prefix}js/components/qa-sidebar.js"></script>
    <script type="module" src="{common_prefix}js/components/qa-test-page.js"></script>
    <script type="module" src="{common_prefix}js/components/qa-screenshot-step.js"></script>

</body>
</html>
